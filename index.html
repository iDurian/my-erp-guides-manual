<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP 使用手册</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #f1f5f3;
      --ink: #172026;
      --muted: #66737d;
      --line: #d9e0e4;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --accent-soft: #e1f1ee;
      --warn: #b45309;
      --shadow: 0 16px 42px rgba(23, 32, 38, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    a { color: inherit; }

    .shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfcfc;
      padding: 24px 18px;
    }

    .brand {
      display: grid;
      gap: 8px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .search {
      margin: 18px 0;
      display: grid;
      gap: 8px;
    }

    .search label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .search input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .category-list {
      display: grid;
      gap: 8px;
    }

    .category-button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 10px 12px;
      border-radius: 8px;
      font: 700 14px/1.35 inherit;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .category-button:hover,
    .category-button.active {
      background: var(--accent-soft);
      border-color: #b7dcd5;
      color: var(--accent-strong);
    }

    .category-button small {
      color: var(--muted);
      font-weight: 700;
    }

    .main {
      min-width: 0;
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }

    .hero h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 860px;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 8px 12px;
      font: 700 14px/1 inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(340px, 440px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .guide-list {
      display: grid;
      gap: 10px;
    }

    .guide-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 14px;
      text-align: left;
      cursor: pointer;
      box-shadow: none;
    }

    .guide-card:hover,
    .guide-card.active {
      border-color: #94c7bf;
      box-shadow: var(--shadow);
    }

    .guide-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .guide-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: #43515a;
      font-weight: 700;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: auto;
      position: sticky;
      top: 28px;
      max-height: calc(100vh - 56px);
    }

    .panel-head {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toc {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toc button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 18px;
    }

    .manual-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      overflow: auto;
    }

    .manual-section h4 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .section-body {
      color: #2e3a42;
      font-size: 14px;
      line-height: 1.75;
    }

    .section-body p,
    .step-body p {
      margin: 0 0 10px;
    }

    .section-body ul,
    .section-body ol,
    .step-body ul,
    .step-body ol {
      margin: 0 0 12px 20px;
      padding: 0;
    }

    .section-body li,
    .step-body li {
      margin: 4px 0;
    }

    .section-body h4,
    .step-body h4 {
      margin: 14px 0 8px;
      font-size: 15px;
      line-height: 1.4;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 10px 0 14px;
    }

    .manual-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      font-size: 13px;
      line-height: 1.55;
    }

    .manual-table th,
    .manual-table td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    .manual-table th {
      background: var(--surface-soft);
      font-weight: 800;
      color: #314047;
    }

    .manual-table tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .step-title {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
      font-weight: 800;
      line-height: 1.45;
    }

    .step-title span {
      flex: 0 0 auto;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      display: inline-grid;
      place-items: center;
      font-size: 14px;
    }

    .step img {
      display: block;
      width: 100%;
      height: auto;
      background: #eef1f3;
    }

    .step-body {
      padding: 14px;
      border-top: 1px solid var(--line);
      color: #2e3a42;
      font-size: 14px;
      line-height: 1.75;
    }

    .markdown-link {
      color: var(--accent-strong);
      font-weight: 800;
      text-decoration: none;
    }

    .notice {
      border: 1px solid #f3d6a6;
      background: #fff8ed;
      color: #71440b;
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .loading {
      color: var(--muted);
      padding: 20px 0;
      line-height: 1.8;
    }

    body.manual-locked {
      overflow: hidden;
    }

    body.manual-locked .shell {
      visibility: hidden;
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(120deg, rgba(15, 118, 110, .14), transparent 34%),
        linear-gradient(300deg, rgba(23, 32, 38, .1), transparent 42%),
        #f6f7f9;
    }

    body.manual-locked .auth-gate {
      display: grid;
    }

    .auth-card {
      width: min(100%, 420px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-card h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .auth-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .auth-form label {
      color: #314047;
      font-size: 13px;
      font-weight: 800;
    }

    .auth-form input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    .auth-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .14);
    }

    .auth-error {
      min-height: 20px;
      margin: 0;
      color: #b42318;
      font-size: 13px;
      font-weight: 700;
    }

    .auth-submit {
      height: 44px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: 800 14px/1 inherit;
      cursor: pointer;
    }

    .auth-submit:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    @media (max-width: 1120px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .panel {
        position: static;
        max-height: none;
      }
      .layout { grid-template-columns: 1fr; }
      .hero { grid-template-columns: 1fr; }
      .hero-actions { justify-content: flex-start; }
    }

    @media (max-width: 640px) {
      .main,
      .sidebar { padding: 18px; }
      .hero h2 { font-size: 26px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    ;(() => {
      const passwordHash = 'f8e4200002de510a9720c979bf3ae2bbd07462c603e27e52af89e83af30aa919'
      const sessionKey = 'erpManualAccessGranted'
      const form = document.querySelector('#authForm')
      const input = document.querySelector('#manualPassword')
      const error = document.querySelector('#authError')

      if (sessionStorage.getItem(sessionKey) === '1') {
        unlockManual()
        return
      }

      window.addEventListener('load', () => input.focus())

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        error.textContent = ''
        const value = input.value.trim()
        if (!value) {
          error.textContent = '请输入访问密码。'
          input.focus()
          return
        }
        const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(value))
        const hash = Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, '0')).join('')
        if (hash !== passwordHash) {
          error.textContent = '密码不正确，请重新输入。'
          input.select()
          return
        }
        sessionStorage.setItem(sessionKey, '1')
        unlockManual()
      })

      function unlockManual() {
        document.body.classList.remove('manual-locked')
      }
    })()
  </script>

    "searchable": "登录与账号入口 登录与账号入口 guides/login/readme.md 本模块用于新用户第一次进入系统时学习登录、错误提示、用户菜单、修改密码和退出登录。 适用对象 操作步骤 1. 打开登录页 2. 识别登录失败提示 3. 输入账号和密码 4. 登录成功后进入工作台 5. 打开右上角用户菜单 6. 修改密码 7. 退出登录 常见问题 安全提醒 适用对象 - 所有新用户。 - 培训讲师。 - 系统管理员在发放账号时使用。 操作步骤 1. 打开登录页 打开系统地址后会进入登录页。用户需要输入分配给自己的账号和密码。 2. 识别登录失败提示 如果账号或密码不正确，系统会在登录按钮上方显示错误提示。遇到该提示时，应先检查账号、密码和大小写；仍无法登录时联系管理员重置密码。 3. 输入账号和密码 账号示例为 admin。实际培训或生产使用时，应输入管理员分配的个人账号。密码输入框会自动隐藏明文，避免旁人看到。 4. 登录成功后进入工作台 登录成功后默认进入全局工作台。新用户应先查看待办、异常、库存和资金风险，再进入具体模块处理业务。 5. 打开右上角用户菜单 点击右上角用户菜单，可以查看当前账号、角色，进入系统设置、修改密码或退出登录。 6. 修改密码 修改密码时需要输入当前密码、新密码并再次确认。保存后新密码立即生效。 7. 退出登录 公共电脑或共享办公环境中，使用完成后应主动退出登录。退出后系统会回到登录页。 常见问题 - 忘记密码：联系系统管理员重置密码。 - 提示账号或密码错误：检查账号、密码、大小写和输入法状态。 - 看不到某些菜单：通常是当前账号角色没有对应权限。 - 登录后菜单和同事不同：不同角色拥有不同菜单、字段和数据范围。 - 修改密码失败：确认当前密码正确，并按系统密码规则设置新密码。 安全提醒 - 不要共用账号。 - 不要把密码写在纸面或聊天工具中。 - 公共电脑使用完成后应退出登录。 - 发现账号异常或权限不对时，及时联系系统管理员。 打开登录页  登录失败提示  输入账号和密码  登录成功进入工作台  用户菜单  修改密码  退出登录 "

    "searchable": "基础资料：客户、供应商、产品 基础资料截图指引 guides/master-data/readme.md 本模块用于新用户理解业务录单前需要先维护哪些基础资料。客户、供应商和产品是报价、合同、采购、库存和财务单据的基础。 适用对象 操作步骤 1. 查看客户档案 2. 搜索客户 3. 新增客户 4. 查看供应商档案 5. 新增供应商基础信息 6. 维护供应商联系人、账户和地址 7. 查看产品档案 8. 使用产品导入导出 9. 新增产品基础信息 10. 维护产品规格参数 使用建议 常见问题 适用对象 - 销售/业务员。 - 采购员。 - 仓管员。 - 财务。 - 系统管理员和关键用户。 操作步骤 1. 查看客户档案 客户档案维护客户公司信息、联系人、discharging port 和默认贸易/付款条款。报价和销售合同会优先带出这些资料。 2. 搜索客户 可以按客户编码、公司名、联系人、国家、港口或条款快速搜索客户。 3. 新增客户 新增客户时优先填写公司名、合同名、地址、联系人、国家、贸易条款和付款方式。 4. 查看供应商档案 供应商档案维护供应商基础信息、联系人、账户信息、发货地址和采购条款。 5. 新增供应商基础信息 新增供应商先填写识别信息。后续采购合同、采购入库、采购发票和付款会使用这些资料。 6. 维护供应商联系人、账户和地址 供应商可以维护多个联系人、收款账户和发货地址，并设置默认项。 7. 查看产品档案 产品档案统一维护通用产品和客户专属产品。价格从业务单据记录，不在产品档案维护。 8. 使用产品导入导出 产品档案支持导入模板、批量导入和导出，适合初始化大量 sku。 9. 新增产品基础信息 新增产品先确认产品编码、产品名称、来源、所属客户、产品类型和单位。 10. 维护产品规格参数 规格与参数会影响报价、合同、库存看板和导出文件，建议按统一字段维护。 使用建议 - 录入报价单或销售合同前，先确认客户和产品档案是否完整。 - 创建采购合同前，先确认供应商档案、联系人和收款账户是否完整。 - 产品规格字段尽量统一，避免同一含义使用多个名称。 - 批量初始化资料时优先使用导入模板。 常见问题 - 为什么报价单里带不出客户信息：先检查客户档案是否维护完整。 - 为什么采购付款时找不到供应商账户：先检查供应商档案中的账户信息。 - 为什么产品规格在导出里不一致：可能是产品档案的规格字段命名不统一。 - 什么时候用客户专属产品：当产品只服务某个客户、需要绑定客户料号或专属规格时使用。 客户档案列表  搜索客户  新增客户  供应商档案列表  新增供应商基础信息  供应商联系人账户地址  产品档案列表  产品导入导出  新增产品基础信息  维护产品规格参数 "

确。 - 币种是否与合同和付款币种一致。 - 是否将常用账户设为默认。 步骤 07：添加发货地址 添加默认发货地址。提货通知、采购入库和物流沟通会引用这里的发货人、电话和地址。 发货地址建议写清： - 发货点名称，例如东莞工厂仓。 - 发货人和电话。 - 详细地址。 - 国家和邮编。 步骤 08：填写合同条款 填写质量、包装、单证和争议解决条款。采购合同可带出默认条款，再按订单实际情况调整。 示例： 条款 示例 ------ 质量条款 按确认样品和采购合同规格验收 包装条款 外箱需标明产品编码、批号和数量 单证要求 invoice / packing list / 出厂检验报告 争议解决 双方友好协商，协商不成按合同约定处理 步骤 09：填写备注并保存 备注用于记录供应商合作背景、限制条件或内部提醒。保存前确认基本信息、联系人、账户和发货地址都已完整。 保存前检查： - 供应商名称是否和合同主体一致。 - 分类和能力说明是否便于采购筛选。 - 默认联系人是否可用。 - 默认收款账户是否经过财务核对。 - 默认发货地址是否完整。 - 默认付款条件、交期和数量允差是否经过采购确认。 - 合同条款是否适合该供应商。 步骤 10：保存后回到列表验证 保存后回到供应商列表，搜索名称确认供应商已经进入档案。之后采购合同、提货通知、采购入库、采购发票和付款流程都可以引用这个供应商。"

辊费 袋类产品常见版辊费。填写版辊数量、单价、币种和退费达标金额后，报价或合同创建时可提示业务人员。 版辊费字段说明： 字段 填写方式 ------ 版辊数量 例如 6 版辊单价 例如 120 币种 例如 usd 退费达标金额 例如 35000 达标币种 通常与版辊费币种一致 说明 写清楚退费条件 步骤 08：填写备注并保存 备注用于记录客户口径、历史来源或特殊要求。保存前确认产品名称、所属客户、产品类型、单位、规格参数和费用口径都已完整。 保存前检查： - 产品名称是否清楚。 - 客户专属产品是否绑定客户。 - 产品类型是否正确。 - 单位是否与业务单据一致。 - 关键规格参数是否完整。 - 需要版辊费的产品是否已维护费用。 步骤 09：保存后回到列表验证 保存后回到产品列表，搜索产品名称确认产品已经进入产品档案。之后报价、销售合同、采购合同、库存入库和库存出库都可以引用这个产品。"

下游流程 保存并已确认 客户、产品、数量、金额和条款已确认 可作为正式源单进入申购、采购、库存、财务和归档流程 步骤 10：回到销售合同列表验证 回到销售合同列表，搜索合同号，确认销售合同已生成并已确认。列表中应能看到客户、状态和合同金额。 步骤 11：查看合同后续动作 已确认销售合同是后续申购、采购、库存、收款和文档归档的核心源单。下一步通常是下推申购单，系统会按销售合同 sku 计算库存占用和采购缺口。"

、单位、币种和总金额一致。 核对重点： - 数量是否等于客户下单数量。 - 单价是否与客户确认一致。 - 单位是否与单价口径一致。 - 合同金额是否符合客户 po 或线下合同。 步骤 07：核对客户信息 展开客户信息，核对公司名、合同名、地址、联系人和电话。必要时可在本单二次编辑；如果是长期错误，应回客户档案修正。 步骤 08：维护贸易条款 展开贸易条款，确认 incoterm、付款方式、装港和卸港。合同条款应与客户确认口径一致。 常见填写： 字段 示例 ------ incoterm fob / cif / exw payment term 30% tt advance, 70% before shipment loading port xiamen port discharging port shanghai port 步骤 09：查看合同附件区域 合同附件区域用于上传盖章合同、客户 po、补充协议或往来确认材料。新建时可先保存，再补充附件。 建议上传： - 客户 po。 - 盖章销售合同。 - 邮件确认截图或 pdf。 - 补充协议、变更通知或特殊要求说明。 步骤 10：填写备注并保存 备注用于记录合同背景、客户确认方式和内部交接说明。确认无误后点击保存。 保存前检查： - 客户和合同主体是否正确。 - 产品、数量、单价、单位和币种是否正确。 - 贸易条款和付款方式是否确认。 - 客户 po / ref. no. 是否填写。 - 附件是否已上传或已安排后续补充。 - 备注是否写清特殊交付、包装、付款或沟通要求。 步骤 11：选择保存状态 销售合同进入后续申购、采购、出库和收款流程前，应选择“保存并已确认”。资料未齐时先保存到草稿。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 资料未核对、金额未确认、附件未补齐 不进入正式履约，不建议下推 保存并已确认 客户、产品、数量、金额和条款已确认 可下推申购单，并进入采购、库存、财务和文档归档 步骤 12：保存后回到列表验证 保存后回到销售合同列表，搜索合同号，确认合同已生成并已确认。下一步通常是下推申购单。"

    "searchable": "如何从销售合同下推申购单 如何从销售合同下推申购单 guides/销售管理/销售合同下推申购单/readme.md 本指引用于培训新用户把已确认销售合同下推为申购单。示例覆盖查找已确认销售合同、打开合同详情、阅读下推确认、生成申购单草稿、核对库存占用和采购缺口、保存并确认申购单，以及验证后续可下推采购合同。 适用场景 前置条件 字段和计算口径 步骤 01：找到已确认销售合同 步骤 02：打开销售合同详情 步骤 03：确认下推申购单入口 步骤 04：查看下推前确认 步骤 05：确认库存占用和采购缺口影响 步骤 06：生成申购单草稿 步骤 07：查看申购汇总 步骤 08：查看产品采购缺口 步骤 09：核对来源销售合同 步骤 10：填写备注并保存申购单 步骤 11：保存并确认申购单 适用场景 - 销售合同已经生效，需要进入采购准备。 - 客户合同数量已经确认，需要先判断现有库存是否可以承接。 - 同一张销售合同要形成申购单，作为采购合同、提货通知和入库的来源。 - 需要让采购只采购真实缺口，而不是重复采购全部销售数量。 前置条件 - 销售合同已保存并已确认。 - 合同产品、数量、单位和交付要求已经核对。 - 产品档案已建立，sku、品名、单位和产品类型完整。 - 需要进入采购准备的业务已经得到内部确认。 字段和计算口径 字段 含义 填写或检查方式 影响 ------------ 销售合同 申购单来源单据 由下推自动带出 后续采购、入库和履约都按此追溯 需求总数 销售合同产品需求数量 系统从销售合同产品行带出 代表客户实际需求 已有库存 当前账面库存 系统只读展示 用于理解现有库存规模 可申购库存 当前可被本申购单占用的库存 系统按可用库存计算，必要时人工复核 会减少后续需采购数量 需采购数量 本次还需要采购的数量 系统计算：需求总数 - 可申购库存 后续采购合同承接此数量 备注 申购说明 记录来源、库存判断和采购安排 便于采购、仓库和管理层交接 保存状态 草稿 / 已确认 资料未齐先草稿，确认无误后保存并已确认 已确认后才正式占用可申购库存，并可继续下推采购合同 核心公式： text 需采购数量 = 需求总数 - 可申购库存 注意：已有库存只是只读参考；真正用于本张申购单的是“可申购库存”。如果已有库存已经被其他业务占用，可申购库存可能小于已有库存。 常见错误 - 销售合同还在草稿状态就尝试下推申购单，导致无法进入正式申购流程。 - 没有核对产品行，导致错误 sku 或错误数量进入采购准备。 - 把“已有库存”误认为一定可用，忽略库存可能已被其他业务占用。 - 手工修改可申购库存后没有复核公式，导致需采购数量不符合实际。 - 申购单只保存到草稿，忘记保存并已确认，后续无法稳定下推采购合同。 - 重复下推同一张销售合同。系统通常会打开已有下游单据，应避免人为重复采购。 - 跳过申购单直接手工创建采购合同，导致采购数量缺少库存缺口依据。 保存前检查清单 - 销售合同状态为已确认。 - 客户、产品、数量、单位和交付要求已经核对。 - 申购单来源销售合同正确。 - 每个产品的需求总数、可申购库存和需采购数量已核对。 - 备注已写清采购安排或特殊说明。 - 确认可以进入采购后，选择“保存并已确认”。 步骤 01：找到已确认销售合同 进入“销售管理 销售合同”，搜索需要履约的销售合同号。只有已确认的销售合同才适合下推申购单。 检查重点： - 单据状态是否为已确认。 - 客户、合同金额和产品数量是否与客户下单一致。 - 是否已经存在来源相同的申购单，避免重复下推。 步骤 02：打开销售合同详情 打开销售合同详情，先核对客户、合同金额、产品明细和单据状态。确认无误后再进入下推动作。 步骤 03：确认下推申购单入口 在已确认销售合同的工具栏点击“下推申购单”。这个动作代表销售合同正式进入采购准备阶段。 步骤 04：查看下推前确认 系统会弹出下推前确认。这里要确认销售合同已经生效，客户下单数量和交付要求可以进入履约。 步骤 05：确认库存占用和采购缺口影响 继续下推后，系统会读取已有库存，计算可申购库存，再得到每个产品的需采购数量。 业务含义： - 有可用库存时，优先占用库存。 - 库存不足时，只把缺口带入后续采购。 - 取消不会生成申购单，也不会改变库存占用。 步骤 06：生成申购单草稿 系统生成申购单并进入详情页。新申购单先是草稿，保存并确认后才正式占用库存并进入采购合同流程。 步骤 07：查看申购汇总 申购汇总展示需求总数、已有库存、可申购库存和需采购数量。培训时应重点解释公式： text 需求总数 - 可申购库存 = 需采购数量 示例图中需求总数为 5,000，可申购库存为 0，因此需采购数量为 5,000。 步骤 08：查看产品采购缺口 逐行核对每个 sku 的需求总数、已有库存、可申购库存和需采购数量。后续采购合同只应承接“需采购数量”。 核对建议： - sku 和品名是否对应销售合同。 - 需求数量是否等于客户合同数量。 - 可申购库存是否符合当前库存判断。 - 需采购数量是否符合业务预期。 步骤 09：核对来源销售合同 申购单会保留来源销售合同。后续采购、提货、入库、出库和财务核对都可以追溯回这张销售合同。 步骤 10：填写备注并保存申购单 如有必要，在备注中写明申购来源、库存判断、采购安排或特殊交付要求。确认产品和采购缺口无误后点击保存。 备注示例： text 由销售合同 ht2606276154 下推生成。确认采购缺口后保存并已确认。 步骤 11：保存并确认申购单 资料未齐时可以先保存到草稿；确认需求和缺口无误后选择“保存并已确认”。已确认申购单才正式占用可申购库存，并作为后续采购合同的来源。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 仍需复核产品、数量、库存或备注 不应进入正式采购 保存并已确认 销售需求、库存占用和采购缺口已确认 可下推采购合同，并参与后续统计 步骤 12：回到申购单列表验证 保存后回到“采购管理 申购单”，搜索申购单号，确认申购单已生成并已确认。 步骤 13：查看下推采购合同入口 已确认申购单可以继续下推采购合同。采购合同应只承接申购单计算出的真实采购缺口。"

        "html": "<ul><li>客户订单累计达到返还门槛，需要确认是否应退还客户版辊费。</li><li>已向供应商支付版辊费，需要确认是否可以向供应商追返。</li><li>财务月末核对版辊费收取、付款、退款和未闭环差额。</li><li>业务或采购发现版辊费状态异常，需要追溯来源单据。</li><li>管理层查看版辊专题风险：客户待退、供应商待追返、客户已退金额。</li></ul>"
      },
      {
        "title": "字段说明",
        "html": "<div class=\"table-wrap\"><table class=\"manual-table\"><thead><tr><th>区域</th><th>字段</th><th>填写或查看方式</th></tr></thead><tbody><tr><td>汇总指标</td><td>台账行数</td><td>当前筛选条件下的客户 + SKU 行数。</td></tr><tr><td>汇总指标</td><td>客户待退</td><td>产品已达标、客户版辊费已收或已列入合同，但尚未返还客户的行数。</td></tr><tr><td>汇总指标</td><td>供应商待追返</td><td>已向供应商支付版辊费，且达标后尚未完全追回的行数。</td></tr><tr><td>汇总指标</td><td>客户已退金额</td><td>当前筛选范围内客户退款单已登记的版辊返还金额。</td></tr><tr><td>筛选区</td><td>搜索</td><td>可输入客户、SKU、产品名称或状态关键字。</td></tr><tr><td>筛选区</td><td>客户</td><td>只查看某个客户下所有 SKU 的版辊费记录。</td></tr><tr><td>筛选区</td><td>状态</td><td>可筛选客户达标待退、客户已返还、供应商待追返、供应商已返、未收版辊费。</td></tr><tr><td>明细表</td><td>客户 / SKU</td><td>一行代表一个客户 + 一个产品 SKU。</td></tr><tr><td>明细表</td><td>累计销售</td><td>有效客户合同中该 SKU 的累计销售金额。</td></tr><tr><td>明细表</td><td>达标进度</td><td>累计销售金额 / 产品版辊返还门槛。</td></tr><tr><td>明细表</td><td>客户版辊费</td><td>合同已列、客户已收、客户已退三类金额。</td></tr><tr><td>明细表</td><td>客户状态</td><td>判断客户侧是否未收、已收、达标待退、部分返还或已返还。</td></tr><tr><td>明细表</td><td>供应商版辊费</td><td>已付供应商和供应商已退金额。</td></tr><tr><td>明细表</td><td>供应商状态</td><td>判断供应商侧是否未付、已付未达标、待追返、部分返或已返。</td></tr><tr><td>明细表</td><td>相关单据</td><td>打开来源销售合同、收款单、付款单、退款单继续核查。</td></tr></tbody></table></div>"

      {
        "title": "操作步骤",
        "html": "<h4>步骤 01：进入版辊费台账</h4><p>从分析报表进入「版辊费台账」。页面标题下方说明本报表按客户 + SKU 汇总版辊费收取、退还、供应商付款、供应商退款和累计达标进度。</p><h4>步骤 02：查看汇总指标</h4><p>先看顶部四个指标。客户待退和供应商待追返通常是优先处理对象；客户已退金额用于核对当前筛选范围内已经返还客户的总额。</p><h4>步骤 03：查看筛选条件</h4><p>筛选区用于缩小核对范围。常用顺序是先输入客户或 SKU，再根据客户和状态进一步收窄。</p><h4>步骤 04：查看版辊费明细</h4><p>明细表按客户 + SKU 展示。不要只看客户名称，同一客户可能有多个 SKU，每个 SKU 的版辊门槛、收费和返还状态都可能不同。</p><h4>步骤 05：搜索客户、SKU 或产品</h4><p>在搜索框输入客户名、SKU 编码或产品名称。适合快速定位某一个版辊费项目，例如客户来问某个产品是否已达到返还条件。</p><h4>步骤 06：按客户筛选</h4><p>选择客户后，页面只显示该客户相关 SKU。客户对账时建议先使用客户筛选，再导出 Excel 或逐行打开相关单据。</p><h4>步骤 07：按状态筛选</h4><p>状态筛选用于处理待办和异常。优先查看「客户达标待退」和「供应商待追返」，这两类通常表示业务已经触发返还条件但尚未完全闭环。</p><h4>步骤 08：查看达标进度</h4><p>达标进度显示累计销售距离返还门槛的完成度。达到 100% 后，如果客户版辊费已收或合同已列，应继续核对是否需要创建客户退款单。</p><h4>步骤 09：核对客户版辊费</h4><p>客户版辊费需要同时看三项：合同、已收、已退。合同金额说明销售合同中已列版辊费；已收金额说明收款单已登记；已退金额说明客户退款单已返还。</p><h4>步骤 10：追溯相关单据</h4><p>相关单据用于追溯来源。金额异常时先打开销售合同、收款单、付款单或退款单核查 SKU、版辊费行和状态，不要直接在台账页修改。</p>"
      },
      {
        "title": "状态判断",
        "html": "<ul><li>未收版辊费：产品需要版辊费，但客户合同或收款单没有登记版辊费行。</li><li>已收/已列版辊费：客户合同或收款单已有版辊费，但累计销售尚未达到返还门槛。</li><li>达标待退客户：累计销售已达到门槛，且客户侧尚未登记客户退款单。</li><li>客户部分返还：已有客户退款单，但退款金额小于应返金额。</li><li>客户已返还：客户侧已登记退款。</li><li>未付供应商：尚未登记供应商版辊付款。</li><li>已付未达标：供应商版辊费已支付，但客户累计销售还未达门槛。</li><li>供应商待追返：已达标且已付供应商，但尚未登记供应商退款。</li><li>供应商部分返：供应商已退部分金额，仍有差额。</li><li>供应商已返：供应商侧退款已登记。</li></ul>"
      },
      {
        "title": "常见错误",
        "html": "<ul><li>只创建版辊记录，没有在产品中维护版辊费配置，台账可能无法判断返还门槛。</li><li>客户退款单或供应商退款单没有绑定 SKU 或版辊费行，金额无法落到具体台账行。</li><li>把客户返还登记成收款单或费用单，导致客户状态不闭环。</li><li>只看客户待退，忽略供应商待追返，造成供应商侧资金未追回。</li><li>同一客户多个 SKU 混在一起核对，误把一个 SKU 的达标进度当成全部产品达标。</li><li>未确认单据状态。草稿或作废单据不会作为有效台账来源。</li></ul>"
      },
      {
        "title": "保存前检查清单",
        "html": "<ul><li>产品档案已维护版辊费、币种、数量、单价和返还门槛。</li><li>销售合同或收款单中的版辊费行已绑定正确 SKU。</li><li>付款单中的版辊费行已绑定正确 SKU，并能关联到客户合同。</li><li>客户退款单用于登记退还客户的版辊费。</li><li>供应商退款单用于登记供应商返还我司的版辊费。</li><li>台账中客户状态和供应商状态与实际处理结果一致。</li><li>需要对外或内部留档时，导出 Excel 前先确认筛选范围。</li></ul>"
      },

供应商，但尚未登记供应商退款。 - 供应商部分返：供应商已退部分金额，仍有差额。 - 供应商已返：供应商侧退款已登记。 常见错误 - 只创建版辊记录，没有在产品中维护版辊费配置，台账可能无法判断返还门槛。 - 客户退款单或供应商退款单没有绑定 sku 或版辊费行，金额无法落到具体台账行。 - 把客户返还登记成收款单或费用单，导致客户状态不闭环。 - 只看客户待退，忽略供应商待追返，造成供应商侧资金未追回。 - 同一客户多个 sku 混在一起核对，误把一个 sku 的达标进度当成全部产品达标。 - 未确认单据状态。草稿或作废单据不会作为有效台账来源。 保存前检查清单 - 产品档案已维护版辊费、币种、数量、单价和返还门槛。 - 销售合同或收款单中的版辊费行已绑定正确 sku。 - 付款单中的版辊费行已绑定正确 sku，并能关联到客户合同。 - 客户退款单用于登记退还客户的版辊费。 - 供应商退款单用于登记供应商返还我司的版辊费。 - 台账中客户状态和供应商状态与实际处理结果一致。 - 需要对外或内部留档时，导出 excel 前先确认筛选范围。 相关教程 - 如何创建版辊记录 - 如何生成版辊应付 - 如何处理版辊返还 - 如何创建客户退款单 - 如何创建供应商退款单 步骤 01：进入版辊费台账 从分析报表进入「版辊费台账」。页面标题下方说明本报表按客户 + sku 汇总版辊费收取、退还、供应商付款、供应商退款和累计达标进度。 步骤 02：查看汇总指标 先看顶部四个指标。客户待退和供应商待追返通常是优先处理对象；客户已退金额用于核对当前筛选范围内已经返还客户的总额。 步骤 03：查看筛选条件 筛选区用于缩小核对范围。常用顺序是先输入客户或 sku，再根据客户和状态进一步收窄。 步骤 04：查看版辊费明细 明细表按客户 + sku 展示。不要只看客户名称，同一客户可能有多个 sku，每个 sku 的版辊门槛、收费和返还状态都可能不同。 步骤 05：搜索客户sku产品 在搜索框输入客户名、sku 编码或产品名称。适合快速定位某一个版辊费项目，例如客户来问某个产品是否已达到返还条件。 步骤 06：按客户筛选 选择客户后，页面只显示该客户相关 sku。客户对账时建议先使用客户筛选，再导出 excel 或逐行打开相关单据。 步骤 07：按状态筛选 状态筛选用于处理待办和异常。优先查看「客户达标待退」和「供应商待追返」，这两类通常表示业务已经触发返还条件但尚未完全闭环。 步骤 08：查看达标进度 达标进度显示累计销售距离返还门槛的完成度。达到 100% 后，如果客户版辊费已收或合同已列，应继续核对是否需要创建客户退款单。 步骤 09：核对客户版辊费 客户版辊费需要同时看三项：合同、已收、已退。合同金额说明销售合同中已列版辊费；已收金额说明收款单已登记；已退金额说明客户退款单已返还。 步骤 10：追溯相关单据 相关单据用于追溯来源。金额异常时先打开销售合同、收款单、付款单或退款单核查 sku、版辊费行和状态，不要直接在台账页修改。"

    "searchable": "如何创建采购合同 如何创建采购合同 guides/采购管理/创建采购合同/readme.md 本指引用于培训新用户手工创建一张采购合同。示例覆盖进入采购合同列表、打开新增采购合同、选择供应商、填写采购产品、数量和买入单价、核对合同金额、核对供应商信息、采购方公司信息、供应商收款信息、采购交付与付款、附件和备注，以及保存并验证。 适用场景 前置条件 字段填写说明 步骤 01：进入采购合同列表 步骤 02：打开新增采购合同 步骤 03：选择供应商和基本信息 步骤 04：搜索并选择采购产品 步骤 05：填写采购数量和买入单价 步骤 06：核对采购合同金额 步骤 07：核对供应商信息 步骤 08：核对采购方公司信息 步骤 09：核对供应商收款信息 步骤 10：填写采购交付与付款 步骤 11：查看合同附件区域 适用场景 - 历史采购合同需要补录到系统。 - 非销售合同缺口的临时采购需要登记。 - 供应商采购已经线下确认，需要手工建立采购执行合同。 - 上游申购单暂不存在，但采购、仓库和财务仍需要一张正式采购合同作为后续来源。 前置条件 - 供应商档案已建立，建议维护联系人、地址、税号和收款信息。 - 产品档案已建立，sku、品名、规格、单位和产品类型完整。 - 采购数量、买入单价、币种、交付日期、交付地点和付款条件已确认。 - 供应商报价、盖章合同、邮件确认或补充协议等附件资料已准备好，或计划后续补充。 字段填写说明 字段 是否必填 填写方式 影响 ------------ 供应商 必填 从供应商档案选择 决定采购合同对象、供应商信息、后续应付和付款追溯 单据日期 必填 默认当天，可按合同日期调整 采购合同记录和统计日期 交付日期 必填 填供应商承诺交货日期 供应商生产完成、提货和入库跟进参考 申购单 建议填写 有上游申购单时选择；手工场景可为空 保留采购合同与申购缺口的来源关系 币种 建议填写 如 cny、usd 决定买入单价、合同金额和应付币种 产品 / 费用 必填 从产品档案搜索选择 后续提货、入库、采购发票和付款追溯依赖产品行 数量 必填 按供应商确认采购数量填写 影响提货、入库和应付数量 买入单价 必填 按供应商确认采购价填写 计算采购合同金额，影响采购分析和应付 供应商信息 建议核对 展开后核对供应商名称、联系人、电话、邮箱和地址 合同导出、供应商沟通和对账使用 采购方公司信息 必填项需完整 默认从公司资料带出 采购合同主体信息，保存校验会检查采购方名称 供应商收款信息 建议核对 默认从供应商档案带出 后续付款和供应商对账参考 交付地点 必填 填实际收货或交付地点 保存采购合同的必要字段 付款条件 建议填写 填预付款、尾款、账期等 付款安排和财务交接依据 合同附件 按需上传 上传报价、盖章采购合同、补充协议等 文档归档和审计追溯 备注 按需填写 写手工创建原因、价格确认、交付付款安排 便于采购、仓库和财务追溯 保存状态 必填 草稿 / 已确认 已确认后才能作为正式采购事实并继续下推提货通知 常见错误 - 常规销售履约场景下手工创建采购合同，导致采购数量缺少申购缺口依据。 - 没有选择供应商，导致采购合同无法保存为正式单据。 - 产品没有从产品档案选择，后续提货、入库和应付无法稳定追溯。 - 采购数量与供应商确认数量不一致。 - 买入单价未填写、币种选错，导致合同金额和应付错误。 - 交付地点为空，保存并确认时校验不通过。 - 供应商收款信息未核对，后续付款时容易出错。 - 附件未上传，后续归档、审计或供应商争议时缺少依据。 - 采购合同只保存为草稿，忘记保存并已确认，后续无法稳定下推提货通知。 保存前检查清单 - 供应商已选择，供应商信息已核对。 - 如有上游申购单，已正确关联申购单。 - 产品、规格、单位、数量和买入单价已核对。 - 币种和合同金额已核对。 - 采购方公司信息完整。 - 供应商收款信息已核对。 - 交付日期、交付地点和付款条件已确认。 - 附件已上传或已安排后续补充。 - 备注已写清手工创建原因、价格和交付付款安排。 - 确认可以进入供应商执行后，选择“保存并已确认”。 步骤 01：进入采购合同列表 进入“采购管理 采购合同”。这里既能查看从申购单下推的采购合同，也能手工创建采购合同。 步骤 02：打开新增采购合同 打开新增采购合同。手工创建时，需要自己选择供应商、产品、采购价格和交付付款信息。 步骤 03：选择供应商和基本信息 选择供应商，确认单据日期、交付日期、来源申购单和币种。手工创建时申购单可以为空，但会弱化来源追溯。 填写建议： - 供应商必须从供应商档案选择。 - 交付日期应与供应商承诺交付日期一致。 - 有上游申购单时尽量关联申购单。 - 币种应与供应商报 骤 05：查看下推入库单确认 下推前再次确认：提货通知对应货物已经实际到库，仓库准备按实物数量入库。 步骤 06：确认入库单库存影响 系统会提示入库单的业务影响：入库单保存确认后形成库存增加事实，并作为采购发票核对来源。 步骤 07：生成入库单草稿 继续下推后，系统生成入库单草稿，并带出提货通知、采购合同、供应商和 ready 产品明细。 步骤 08：核对来源提货通知和采购合同 核对供应商、入库日期、来源提货通知和币种。入库单必须能追溯采购合同，否则后续采购发票、应付和履约进度会断开。 步骤 09：填写实际入库数量、仓库、件数和重量 按仓库实收填写实际入库数量、仓库、件数、净重和毛重。毛重必须大于或等于净重。 示例： 字段 示例 说明 --------- 数量 3,000 本次实际入库数量 买入单价 0.82 从采购合同带出，保存前复核 件数 120 仓库实收包装件数 净重(kg) 2,990 不含包装重量 毛重(kg) 3,050 含包装重量，不能小于净重 仓库 成品仓 实际入库仓库 步骤 10：核对入库数量和物流合计 核对页面底部合计：数量、金额、件数、净重和毛重都要与仓库实收记录一致。 步骤 11：填写备注并保存入库单 备注中记录来源提货通知、实收数量、重量和入库仓库。确认无误后点击保存。 备注示例： text 由提货通知 thtz2606276755 下推生成。本次实际入库 3,000 件，120 件包装，净重 2,990kg，毛重 3,050kg，入成品仓。 步骤 12：保存并确认入库单 如果仓库数据还未复核，可以先保存到草稿；确认实收数量、仓库、件数和重量无误后，选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 仓库实收数据仍需复核 不形成库存事实 保存并已确认 实收数量、金额和物流数据已确认 形成库存增加事实，可生成采购发票 步骤 13：回到入库单列表验证 回到“库存管理 入库单”搜索单号，确认入库单已经生成并处于已确认状态。 步骤 14：查看供应商生产完成看板已入库变化 供应商生产完成看板会把提货通知与入库单关联起来，区分生产完成、待入库和已入库。 看板理解： - 生产完成：来自已确认提货通知单。 - 待入库：生产完成数量减已入库数量。 - 已入库：来自已确认采购入库单。 步骤 15：确认后续采购发票入口 入库单确认后可继续生成采购发票。采购发票用于确认正式应付，并核对发票金额与入库金额差异。"

仓库、件数、净重和毛重。部分发货时只填本次实际出库数量。 示例： 字段 示例 说明 --------- 销售合同数量 5,000 合同总数量 本次出库数量 3,000 本次实际发货数量 单价 1.25 从销售合同带出，保存前复核 件数 100 本次发货包装件数 净重(kg) 2,980 不含包装重量 毛重(kg) 3,040 含包装重量，不能小于净重 仓库 成品仓 实际出库仓库 步骤 07：核对出库数量和物流合计 核对页面底部合计：出库数量、金额、件数、净重和毛重都要与发货记录一致。 步骤 08：填写备注并保存出库单 备注中记录销售合同、本次发货数量、包装件数、重量和出库仓库。确认无误后点击保存。 备注示例： text 销售合同 ht2606278937 本次实际出库 3,000 件，100 件包装，净重 2,980kg，毛重 3,040kg，由成品仓发出。 步骤 09：保存并确认出库单 如果仓库数据还未复核，可以先保存到草稿；确认实际发货数量、仓库、件数和重量无误后，选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 发货数据仍需复核 不形成库存扣减事实 保存并已确认 实际发货数量和物流数据已确认 形成库存扣减事实，可生成销售发票 步骤 10：回到出库单列表验证 回到“库存管理 出库单”搜索单号，确认出库单已经生成并处于已确认状态。 步骤 11：查看销售合同履约出库进度 销售合同履约进度会按出库单累计已出库数量，区分待出库、部分出库和已出库。 进度理解： - 合同数量：来自已确认销售合同。 - 已出库：来自已确认库存出库单。 - 待出库：合同数量减已出库数量。 步骤 12：确认后续销售发票入口 出库单确认后可继续生成销售发票。销售发票用于确认正式应收，并核对发票金额与出库金额差异。"

销售发票。 步骤 06：确认销售发票影响 系统会提示：销售发票用于确认正式应收口径，并核对发票金额与出库金额差异。 步骤 07：生成销售发票草稿 继续生成后，系统生成销售发票草稿，并带出出库单、销售合同、客户和出库产品明细。 步骤 08：核对来源出库单和销售合同 核对客户、来源出库单、关联合同和币种。销售发票必须能追溯出库单和销售合同。 步骤 09：核对默认入账公司账户 核对默认入账公司账户。销售发票保存确认前必须选择默认入账账户，后续收款单可带出并按实际到账账户调整。 步骤 10：填写发票号码和开票信息 填写发票号码、发票代码、发票类型和开票日期。发票号码是销售发票保存确认的必填项。 示例： 字段 示例 说明 --------- 发票号码 inv-xs-20260627-001 正式发票号 发票代码 xsfp-demo-001 可按实际票据填写 发票类型 增值税专票 按实际发票类型选择 开票日期 2026-06-27 按实际开票日期填写 步骤 11：核对开票明细和发票金额 核对开票产品、数量、单价和价税合计。发票金额会与出库金额对比，差异会进入发票差异看板。 步骤 12：核对出库金额和差异金额 核对出库金额、发票金额和差异金额。金额一致时状态为正常；不一致时需要选择差异处理方式并后续闭环。 差异处理参考： 情况 建议处理 ------ 发票金额大于出库金额 核实是否客户补款、补充费用或订单变更 发票金额小于出库金额 核实是否折让、退款、红冲重开或损失处理 金额录错 修正产品行单价、数量或重新开票 步骤 13：填写备注并保存销售发票 备注中记录来源出库单、开票依据和差异说明。确认无误后点击保存。 备注示例： text 由出库单 ck2606274281 生成。客户正式开票金额与出库金额一致，作为正式应收依据。 步骤 14：保存并确认销售发票 资料未齐时可以先保存到草稿；发票号码、默认入账账户、产品明细和金额核对无误后，选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 发票号码、账户或金额仍需复核 不作为正式应收口径 保存并已确认 开票信息和金额已确认 作为正式应收口径，可生成收款单 步骤 15：回到销售发票列表验证 回到“财务管理 销售发票”搜索单号，确认销售发票已经生成并处于已确认状态。 步骤 16：查看应收看板正式应收 应收看板会优先按已确认销售发票作为立账金额；未开票时才按出库单金额参考。 步骤 17：确认后续收款单入口 销售发票确认后可继续生成收款单。收款单记录客户实际到账，并进入资金流水。"

开票，或本次需要登记正式采购发票金额。 步骤 06：确认采购发票影响 系统会提示：采购发票用于确认正式应付口径，并核对发票金额与入库金额差异。 步骤 07：生成采购发票草稿 继续生成后，系统生成采购发票草稿，并带出入库单、采购合同、供应商和入库产品明细。 步骤 08：核对来源入库单和采购合同 核对供应商、来源入库单、关联合同和币种。采购发票必须能追溯入库单和采购合同。 步骤 09：核对默认出账公司账户 核对默认出账公司账户。采购发票保存确认前必须选择默认出账账户，后续付款单可带出并按实际付款账户调整。 步骤 10：填写发票号码和开票信息 填写发票号码、发票代码、发票类型和开票日期。发票号码是采购发票保存确认的必填项。 示例： 字段 示例 说明 --------- 发票号码 inv-cg-20260627-001 供应商正式发票号 发票代码 cgfp-demo-001 可按实际票据填写 发票类型 增值税专票 按实际发票类型选择 开票日期 2026-06-27 按实际开票日期填写 步骤 11：核对开票明细和发票金额 核对开票产品、数量、开票单价和价税合计。发票金额会与入库金额对比，差异会进入发票差异看板。 步骤 12：核对入库金额和差异金额 核对入库金额、发票金额和差异金额。金额一致时状态为正常；不一致时需要选择差异处理方式并后续闭环。 差异处理参考： 情况 建议处理 ------ 发票金额大于入库金额 核实是否补充费用、订单变更或后续补录 发票金额小于入库金额 核实是否供应商折让、退款、红冲重开或损失处理 金额录错 修正产品行单价、数量或重新登记发票 步骤 13：填写备注并保存采购发票 备注中记录来源入库单、开票依据和差异说明。确认无误后点击保存。 备注示例： text 由入库单 rk2606274281 生成。供应商正式开票金额与入库金额一致，作为正式应付依据。 步骤 14：保存并确认采购发票 资料未齐时可以先保存到草稿；发票号码、默认出账账户、产品明细和金额核对无误后，选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 发票号码、账户或金额仍需复核 不作为正式应付口径 保存并已确认 开票信息和金额已确认 作为正式应付口径，可生成付款单 步骤 15：回到采购发票列表验证 回到“财务管理 采购发票”搜索单号，确认采购发票已经生成并处于已确认状态。 步骤 16：查看应付看板正式应付 应付看板会优先按已确认采购发票作为立账金额；未收票时才按入库单金额参考。 步骤 17：确认后续付款单入口 采购发票确认后可继续生成付款单。付款单记录供应商实际付款，并进入资金流水。"

    "searchable": "如何创建客户退款单 如何创建客户退款单 guides/财务管理/创建客户退款单/readme.md 本指引用于培训新用户登记“退还客户的实际出账”。示例采用直接退款型客诉处理单作为来源，覆盖查找客诉、核对退款原因、新建客户退款单、选择来源、核对客户和销售合同、选择实际出账账户、填写退款金额、保存确认、验证客诉已退款，以及查看资金流水出账记录。 适用场景 前置条件 字段填写说明 步骤 01：找到直接退款型客诉处理单 步骤 02：打开客诉处理单详情 步骤 03：核对客诉金额和退款去向 步骤 04：进入客户退款单列表 步骤 05：新建客户退款单草稿 步骤 06：选择来源客诉处理单 步骤 07：核对客户来源和销售合同 步骤 08：选择实际出账公司账户 步骤 09：核对退款明细和金额 步骤 10：按实际出账调整退款金额 步骤 11：填写备注并准备保存 适用场景 - 客户客诉确认需要直接退款。 - 客户多付款、重复付款或金额有误，需要退回客户。 - 版辊费达到返还条件，需要退还客户。 - 财务需要登记真实现金流出，并让退款原因可追溯到合同、收款单、客诉或版辊记录。 前置条件 - 已确认退款原因、退款金额、退款日期和实际出账账户。 - 如果来源是客诉，客诉处理单应为“直接退款”且仍未处理。 - 如果来源是销售合同或收款单，需要确认退款与该客户、合同和回款记录匹配。 - 如为部分退款，需明确剩余待处理金额和后续处理方式。 字段填写说明 字段 是否必填 填写方式 影响 ------------ 客户 必填 从来源客诉/合同/收款单带出，也可手动选择 资金流水、客诉闭环和客户追溯依据 来源单号 建议必填 选择客诉处理单、销售合同或收款单 用于说明为什么退款，避免孤立出账 关联合同 建议必填 从来源自动带出销售合同，可手动核对 方便销售、财务和管理层按合同追溯 币种 建议保留 从来源带出，或按实际退款币种选择 决定金额展示和资金流水币种 出账账户 必填 选择实际付款的公司账户 保存确认后按该账户进入资金流水 费用类别 必填 客诉退款可用“退款扣费”，版辊返还可用“版辊费” 影响后续分类核对 摘要 必填 写退款原因或来源单号 资金流水和列表中快速识别 数量 必填 通常为 1；拆分退款可按实际业务拆行 参与退款金额计算 单价/金额 必填 填本次实际退给客户的金额 本次现金流出金额 备注 建议填写 写来源、退款原因、审批依据和出账账户 便于销售、财务、审计追溯 保存状态 必填 草稿 / 已确认 已确认后进入资金流水；客诉来源会自动闭环 关键规则： text 客诉处理单 = 退款原因和处理安排 客户退款单 = 实际退给客户的现金流出 资金流水 = 只统计已确认的真实现金事件 常见错误 - 客诉处理类型不是“直接退款”，却创建客户退款单。 - 客户退款单没有选择来源单号，后续无法解释退款原因。 - 未选择实际出账公司账户，导致无法保存确认。 - 实际只退部分金额，却按客诉全额登记。 - 退款币种和银行实际出账币种不一致。 - 客户退款单只保存到草稿，误以为已经进入资金流水。 - 多账户退款只登记在一个账户，导致资金流水账户不准。 - 客诉退款后没有回到客诉处理单确认状态是否已退款。 保存前检查清单 - 客户、来源单号和关联合同正确。 - 来源客诉为直接退款，且仍未处理。 - 实际出账公司账户已选择。 - 费用类别、摘要、数量、单价/金额已核对。 - 本次退款金额与银行实际出账金额一致。 - 如果是部分退款，备注已说明剩余金额处理方式。 - 备注已写清退款原因、来源单号和出账依据。 - 如要形成真实现金流出，保存时选择“保存并已确认”。 步骤 01：找到直接退款型客诉处理单 进入“销售管理 客诉处理”，搜索处理类型为直接退款的客诉处理单。 步骤 02：打开客诉处理单详情 打开客诉处理单，核对客户、来源销售合同、客诉状态和客诉金额。 步骤 03：核对客诉金额和退款去向 处理类型为“直接退款”时，后续需要到财务管理新建客户退款单，并在来源单号中选择这张客诉单。 步骤 04：进入客户退款单列表 进入“财务管理 客户退款单”。客户退款单用于登记退还客户的实际出账。 步骤 05：新建客户退款单草稿 点击“新增客户退款单”后进入草稿。草稿不会冲减回款，也不会进入资金流水。 步骤 06：选择来源客诉处理单 在来源单号选择直接退款型客诉处理单，系统会带出客户、销售合同、币种和退款明细。 步骤 07：核对客户来源和销售合同 核对客户、来源客诉单和关联合同。来源关系正确，后续客诉状态才能自动变为已退款。 步骤 08：选择实际出账公司账户 客户退款单必须选择实际出账公司账户，保存确认后资金流水按这个账户记录现金流出。 步骤 09：核对退款明细和金额 核对费用类别、摘要、数量、单价和合计金额。客诉来源会自动带出退款金额。 步骤 10：按实际出账调整退款金额 如果实际只退部分金额，可按银行出账调整单价或数量；全额退款则保持来源金额。 示例： 情况 填写方式 影响 --------- 全额退款 保持来源金额 客诉直接闭环，资金流水记录全额出账 部分退款 修改单价/金额为本次实际出账 备注中说明剩余金额如何处理 多账户退款 按账户分别登记客户退款单 资金流水按账户拆分 步骤 11：填写备注并准备保存 备注写清来源客诉单、退款原因、实际退款金额和出账账户，便于财务与销售追溯。 备注示例： text 关联客诉处理单 ks2606289101。客户直接退款 usd 180.00，按实际出账账户登记。 步骤 12：选择保存状态 金额或账户未确认时保存到草稿；实际退款已出账时选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 金额、账户或审批仍需确认 不进入资金流水，不关闭客诉 保存并已确认 实际退款已经出账 进入资金流水；客诉来源自动显示已退款 步骤 13：保存并确认客户退款单 保存并已确认后，客户退款单成为实际出账事实，会进入资金流水并用于客诉闭环。 步骤 14：回到客户退款单列表验证 回到客户退款单列表搜索单号，确认客户退款单已生成并处于已确认状态。 步骤 15：验证客诉状态已退款 客户退款单确认后，关联的客诉处理单会自动显示已退款，并记录处理去向。 步骤 16：查看资金流水出账记录 资金流水会记录已确认客户退款单的现金流出，可按账户和日期核对退款出账。 步骤 17：查看应收看板退款影响 客户退款属于现金流出，会影响合同回款口径。直接客诉退款如果没有对应出库或销售发票，应收看板可能没有立账行；此时应以客诉状态和资金流水作为主要核对依据。"

公司账户 供应商退款单必须选择实际入账公司账户，保存确认后资金流水按这个账户记录现金流入。 步骤 09：核对供应商退款信息 供应商退款信息用于对比理论应退、本次实退和未退差额；未退差额必须说明原因。 步骤 10：填写理论应退金额 按对账结果填写理论应退金额。例如原付款单多付 cny 200.00，就把理论应退金额填为 200。 步骤 11：填写本次实退金额和差异原因 本次实退金额按银行实际到账填写；理论应退大于实退时，需要填写扣费或差异原因。 示例： 情况 填写方式 影响 --------- 全额退回 理论应退金额 = 本次实退金额 无扣费/差异金额 扣手续费后退回 本次实退金额小于理论应退金额，填写扣费原因 差异金额保留为后续核对依据 只退部分金额 本次实退金额按实际到账填写 备注说明剩余金额后续处理 步骤 12：复核实退差异和原因 复核本次实退金额、扣费/差异金额和原因。差异后续可通过财务调整单闭环。 步骤 13：填写备注并准备保存 备注写清来源付款单、理论应退、实际到账、差异原因和入账账户，便于财务追溯。 备注示例： text 关联付款单 fk2606289201。理论应退 cny 200.00，供应商实际退回 cny 180.00，差额为银行手续费。 步骤 14：选择保存状态 金额或到账账户未确认时保存到草稿；供应商退款已到账时选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 到账金额、账户或差异原因仍需复核 不进入资金流水 保存并已确认 供应商退款已经实际到账 进入资金流水，作为现金流入 步骤 15：保存并确认供应商退款单 保存并已确认后，供应商退款单成为实际现金流入，会进入资金流水。 步骤 16：回到供应商退款单列表验证 回到供应商退款单列表搜索单号，确认退款单已经生成并处于已确认状态。 步骤 17：查看资金流水入账记录 资金流水会记录已确认供应商退款单的现金流入，可按账户和日期核对到账。"

    "searchable": "如何创建费用单 如何创建费用单 guides/财务管理/创建费用单/readme.md 本指引用于培训新用户登记物流费、报关费、港杂费、银行手续费等实际出账费用。示例采用采购合同相关的拖车费和报关费，覆盖查找费用归集来源、新建费用单、关联采购合同、填写往来单位、选择实际出账账户、填写多行费用明细、保存确认、查看资金流水，以及回到费用单复核来源和明细。 适用场景 前置条件 字段填写说明 步骤 01：找到需要归集费用的采购合同 步骤 02：打开采购合同详情 步骤 03：确认费用归集依据 步骤 04：进入费用单列表 步骤 05：新建费用单草稿 步骤 06：关联采购合同并填写往来单位 步骤 07：核对费用单基本信息 步骤 08：选择实际出账公司账户 步骤 09：填写第一行运费 步骤 10：新增并填写报关费 步骤 11：核对费用合计 适用场景 - 支付物流、拖车、海运、报关、港杂、仓储、文件、保险等费用。 - 支付银行手续费、平台服务费或其他杂费。 - 一笔费用需要归集到销售合同或采购合同。 - 财务需要登记真实现金流出，并按公司账户进入资金流水。 前置条件 - 已确认费用账单、付款对象、付款金额和币种。 - 已确认实际出账公司账户。 - 如果费用需要归集到合同，已明确对应销售合同或采购合同。 - 多项费用合并付款时，已拆分每项费用类别和金额。 字段填写说明 字段 是否必填 填写方式 影响 ------------ 往来单位 必填 选择物流公司、报关行、银行、服务商或相关客户/供应商 资金流水和费用追溯的付款对象 来源单号 可选 选择销售合同或采购合同 用于说明费用归属来源 关联合同 可选/建议 选择要归集费用的合同 便于合同维度核对实际费用 币种 必填 按费用账单或银行出账币种选择 决定金额展示和资金流水币种 出账账户 必填 选择实际付款的公司账户 保存确认后按该账户进入资金流水 费用类别 必填 运费、报关费、港杂费、银行手续费等 影响费用分类和后续统计 摘要 必填 简短写明费用内容 列表、资金流水和导出中快速识别 说明 可选 写柜型、票数、服务范围、账单号等 便于复核费用明细 数量 必填 按柜、票、项、次等填写 参与费用金额计算 单位 建议填写 柜、票、项、次等 便于理解费用口径 单价/金额 必填 按实际费用账单填写 本行费用金额 备注 建议填写 写付款依据、合同来源和特殊说明 便于财务、采购、审计追溯 保存状态 必填 草稿 / 已确认 已确认后进入资金流水 关键规则： text 费用单 = 实际费用出账事实 关联合同 = 费用归集和追溯口径 资金流水 = 只统计已确认的真实现金事件 常见错误 - 未选择实际出账公司账户，导致无法保存确认。 - 费用已经实际付款，但只保存到草稿，导致资金流水缺失。 - 费用类别全部填“其他”，后续难以按费用类型统计。 - 多项费用合并付款时没有拆行，导致运费、报关费和手续费混在一起。 - 费用需要归集到合同，但没有选择来源单号或关联合同。 - 往来单位误填为合同供应商，实际付款对象是物流公司或报关行。 - 金额和银行实际出账不一致，备注也没有说明差异。 - 币种和实际出账账户币种不一致。 保存前检查清单 - 往来单位是实际收款方。 - 来源单号和关联合同已按费用归属选择。 - 实际出账公司账户已选择。 - 费用类别、摘要、说明、数量、单位和金额已核对。 - 合计金额与费用账单、银行出账金额一致。 - 多项费用已拆分为多行。 - 备注已写清费用来源、合同、付款依据和特殊说明。 - 如要形成真实现金流出，保存时选择“保存并已确认”。 步骤 01：找到需要归集费用的采购合同 进入“采购管理 采购合同”，找到需要归集物流、报关或港杂费用的采购合同。 步骤 02：打开采购合同详情 打开采购合同详情，核对供应商、合同金额和业务背景，确认费用应归集到这笔采购。 步骤 03：确认费用归集依据 费用单不改变入库数量，但可以关联合同，方便后续按合同核对实际费用。 步骤 04：进入费用单列表 进入“财务管理 费用单”。费用单用于登记物流、报关、港杂、银行手续费等实际出账。 步骤 05：新建费用单草稿 点击“新增费用单”后进入草稿。草稿不会进入资金流水。 步骤 06：关联采购合同并填写往来单位 先选择实际付款对象，再选择来源合同和关联合同。费用单的往来单位通常是物流公司、报关行或银行，不一定是采购合同供应商。 步骤 07：核对费用单基本信息 核对往来单位、日期、负责人和币种。费用单可关联合同，但费用支付对象通常不是原供应商。 步骤 08：选择实际出账公司账户 费用单必须选择实际出账公司账户，保存确认后资金流水按这个账户记录现金流出。 步骤 09：填写第一行运费 选择费用类别，填写摘要、说明、数量、单位和单价/金额。费用金额按实际账单填写。 步骤 10：新增并填写报关费 同一张费用单可以登记多行费用，适合一次付款包含多项费用的场景。 步骤 11：核对费用合计 核对每行费用和总金额。本例运费 cny 650.00、报关费 cny 280.00，合计 cny 930.00。 步骤 12：填写备注并准备保存 备注写清费用来源、关联合同、费用内容、实际出账金额和付款依据。 备注示例： text 关联采购合同 cght2606289301。本次支付拖车费和报关费合计 cny 930.00，按实际出账账户登记。 步骤 13：选择保存状态 金额或账户未确认时保存到草稿；费用已经实际出账时选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 费用金额、账户或审批仍需确认 不进入资金流水 保存并已确认 费用已经实际付款 进入资金流水，作为现金流出 步骤 14：保存并确认费用单 保存并已确认后，费用单成为实际现金流出，会进入资金流水。 步骤 15：回到费用单列表验证 回到费用单列表搜索单号，确认费用单已经生成并处于已确认状态。 步骤 16：查看资金流水出账记录 资金流水会记录已确认费用单的现金流出，可按账户和日期核对费用付款。 步骤 17：复核费用单来源和明细 再次打开费用单，复核来源合同、关联合同和费用明细，确保费用归集可追溯。"

    "searchable": "如何创建报销单 如何创建报销单 guides/财务管理/创建报销单/readme.md 本指引用于培训财务用户登记员工报销。示例采用员工线下提交差旅费、交通费和办公用品票据，覆盖进入报销单列表、新建草稿、填写报销人和基本信息、拆分报销费用明细、选择公司付款账户、填写线下确认备注、查看附件区、保存为已确认、列表验证、资金流水验证，以及回到报销单复核明细。 适用场景 前置条件 字段填写说明 步骤 01：进入报销单列表 步骤 02：新建报销单草稿 步骤 03：填写报销人和基本信息 步骤 04：确认来源和关联合同可选 步骤 05：填写第一行差旅费 步骤 06：新增并填写交通费 步骤 07：新增并填写办公用品 步骤 08：核对报销合计 步骤 09：选择公司付款账户 步骤 10：填写线下确认备注 步骤 11：查看报销附件区 适用场景 - 员工已垫付差旅、交通、住宿、办公用品、样品寄送等费用。 - 员工已在线下提交发票、收据、付款截图或审批记录。 - 财务需要记录公司实际向员工付款的现金流出。 - 报销费用需要按类别拆分，便于后续统计和复核。 - 某笔报销与销售合同或采购合同相关时，可以选择来源单号或关联合同做追溯。 前置条件 - 已确认报销人、报销金额、币种和付款日期。 - 已完成线下票据核对和主管确认。 - 已确认实际付款的公司账户。 - 多项费用合并报销时，已拆分每项费用类别和金额。 - 如果报销需要归集到合同，已明确对应销售合同或采购合同。 字段填写说明 字段 是否必填 填写方式 影响 ------------ 报销人 必填 填写实际垫付员工姓名 列表、资金流水和后续追溯的往来对象 单据日期 必填 填写报销登记日期 报销单列表和统计日期 付款日期 必填 填写公司实际付款或计划付款日期 用于判断和核对付款时间 来源单号 可选 选择相关销售合同或采购合同 说明报销来源，不选也可保存 关联合同 可选 选择需要归集费用的合同 用于合同维度追溯报销费用 币种 必填 按报销和付款币种选择 决定金额展示和资金流水币种 公司付款账户 必填 选择实际出账公司账户 已确认后按该账户进入资金流水 费用类别 必填 差旅费、交通费、住宿费、办公用品、员工报销等 影响费用分类统计 摘要 必填 简短写明费用内容 列表和明细中快速识别 说明 可选 写行程、票据范围、用途、次数等 便于复核费用合理性 数量 必填 按次、项、批、晚等填写 参与金额计算 单位 建议填写 次、项、批、晚等 便于理解费用口径 单价/金额 必填 按票据和审批结果填写 本行报销金额 行备注 建议填写 写票据、截图、用途等说明 便于逐行追溯 线下确认备注 建议填写 写票据已核对、主管已确认、付款说明 便于财务和审计追溯 附件 建议上传 上传发票、收据、付款截图、审批记录 支撑报销真实性和后续复核 保存状态 必填 草稿 / 已确认 草稿不进资金流水；已确认表示已付款并进入资金流水 关键规则： text 报销单 = 员工垫付款项的报销登记 草稿 = 待核对或待付款，不进入资金流水 已确认 = 财务已付款，按公司账户形成现金流出 常见错误 - 报销人填写成客户或供应商名称，而不是实际垫付员工。 - 公司已经付款，但只保存为草稿，导致资金流水缺失。 - 未选择公司付款账户，无法形成准确现金流。 - 多项费用合并成一行“员工报销”或“其他”，后续难以按类别统计。 - 金额与票据、审批或实际付款不一致，备注中也没有说明差异。 - 付款日期和实际付款日期不一致，影响月度资金核对。 - 报销涉及合同成本，但没有选择来源单号或关联合同。 - 未上传或未备注线下确认材料，后续审计难以复核。 保存前检查清单 - 报销人是实际垫付员工。 - 单据日期、付款日期和币种已核对。 - 如需归集到合同，来源单号或关联合同已选择。 - 公司付款账户是实际出账账户。 - 每行费用类别、摘要、说明、数量、单位和金额已填写。 - 合计金额与票据、审批和实际付款一致。 - 多项费用已拆分成多行。 - 线下确认备注已写清票据、审批和付款依据。 - 如已经付款，保存时选择“保存并已确认”。 步骤 01：进入报销单列表 进入“财务管理 报销单”，先查看当前报销记录、搜索区和“新增报销单”入口。 步骤 02：新建报销单草稿 点击“新增报销单”后进入草稿。草稿只保存填写内容，不代表公司已经付款。 步骤 03：填写报销人和基本信息 填写报销人、单据日期、付款日期、负责人、部门和币种。报销人应填写实际垫付员工。 步骤 04：确认来源和关联合同可选 来源单号和关联合同不是必填。普通员工日常报销可以留空；如果费用明确属于某个销售合同或采购合同，再选择对应合同。 步骤 05：填写第一行差旅费 第一行填写差旅费，录入摘要、说明、数量、单位、金额和行备注。金额按票据和审批结果填写。 步骤 06：新增并填写交通费 点击“新增费用行”，把交通费单独拆一行填写。同一张报销单可以登记多项费用。 步骤 07：新增并填写办公用品 继续新增办公用品费用。不要把差旅、交通、办公用品全部合并成一行“其他”，否则后续统计和复核会变困难。 步骤 08：核对报销合计 核对每行金额和总金额。本例差旅费 cny 860.00、交通费 cny 135.00、办公用品 cny 128.00，合计 cny 1,123.00。 步骤 09：选择公司付款账户 选择实际付款的公司账户。报销单必须选择公司付款账户；保存为已确认后，资金流水按该账户记录现金流出。 步骤 10：填写线下确认备注 线下确认备注要写清票据、审批和付款依据。 备注示例： text 已线下核对发票、行程单和主管确认记录。本次报销合计 cny 1,123.00，财务已按人民币主付款账户付款。 步骤 11：查看报销附件区 报销附件可上传发票、收据、付款截图和线下确认材料。培训时建议说明：附件不是金额计算来源，但用于证明报销真实、完整、可追溯。 步骤 12：准备保存报销单 保存前回到顶部，确认报销人、金额、公司付款账户、线下确认备注和附件情况。 步骤 13：选择保存状态 金额、票据或审批仍未确认时保存草稿；如果公司已经实际付款，选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 票据、审批、金额或付款账户仍需核对 不进入资金流水 保存并已确认 财务已经付款或确认作为正式付款事实 进入资金流水，作为现金流出 步骤 14：保存并确认报销单 保存并已确认后，报销单成为正式财务事实。系统将显示单据编号、已确认状态、报销人和报销金额。 步骤 15：回到报销单列表验证 回到报销单列表搜索单号，确认报销单已经生成、状态为已确认、金额和报销人正确。 步骤 16：查看资金流水出账记录 资金流水中会出现已确认报销单，按公司账户记录 cny 1,123.00 的现金流出。 步骤 17：复核报销单明细 再次打开报销单，复核报销人、付款账户、线下确认备注和三行费用明细，确保单据可以被财务和审计追溯。"

    "searchable": "如何创建财务调整单 如何创建财务调整单 guides/财务管理/创建财务调整单/readme.md 本指引用于培训财务用户处理尾差、折让、汇差、坏账、争议扣款等非标准收付款调整事项。示例采用 dpl 销售合同尾差核销，覆盖进入财务调整单列表、新建草稿、选择往来单位、关联合同、填写分摊金额、选择责任公司账户、填写调整原因、保存确认、列表验证、确认不进入资金流水，以及回到单据复核。 适用场景 前置条件 字段填写说明 步骤 01：进入财务调整单列表 步骤 02：新建财务调整单草稿 步骤 03：填写往来单位和基本信息 步骤 04：选择需要调整的合同 步骤 05：查看可分摊目标单据 步骤 06：填写本次调整金额 步骤 07：核对调整合计 步骤 08：选择责任公司账户 步骤 09：填写调整原因备注 步骤 10：准备保存财务调整单 步骤 11：选择保存状态 适用场景 - 客户少付或多付尾差，需要核销余额但没有新的银行收付款。 - 销售或采购发生折让、让利、争议扣款，需要留痕。 - 汇差、手续费差额、四舍五入差额需要调整余额。 - 坏账、无法追回款项或供应商争议损失需要记录。 - 发票差异看板中确认不走退款、补款、费用单或红冲重开，而用财务调整闭环。 前置条件 - 已确认调整对象是客户、供应商或其他往来单位。 - 已确认调整归属的销售合同或采购合同。 - 已确认调整金额、币种和原因。 - 已判断是否存在真实银行收付款：如果有真实收付款，应优先使用收款单、付款单、退款单、费用单或报销单。 - 已确认用于责任归集或核对的公司账户。 字段填写说明 字段 是否必填 填写方式 影响 ------------ 往来单位 必填 选择客户、供应商或相关往来方 决定可分摊的合同范围 单据日期 必填 填写调整登记日期 影响列表和调整记录日期 要求日期 必填 填写调整确认或处理日期 便于后续复核 来源单号 可选 当前无可用源单时可手工关联说明 用于补充来源，不是必填 关联合同 建议必填 选择要调整的销售合同或采购合同 决定调整归属和追溯口径 币种 必填 按合同或调整币种选择 决定分摊金额展示币种 本次分摊金额 必填 在目标合同行填写调整金额 形成调整单金额 公司账户 必填 选择责任账户或核对账户 财务调整单不进资金流水，但需要账户口径 备注 建议填写 写调整类型、合同、金额、原因和是否真实收付 便于财务主管和审计追溯 保存状态 必填 草稿 / 已确认 已确认后成为正式调整记录 关键规则： text 财务调整单 = 非现金调整留痕 分摊金额 = 调整金额来源 资金流水 = 不包含财务调整单 常见错误 - 有真实银行收款或付款，却误用财务调整单，导致资金流水缺失。 - 没有选择往来单位，分摊明细无法显示目标合同。 - 没有关联合同，后续无法判断调整归属。 - 分摊金额填错币种或金额，导致余额核对异常。 - 备注只写“调整”或“尾差”，没有说明原因、合同和是否真实收付。 - 把费用类真实支出写成财务调整单，应改用费用单或报销单。 - 把客户退款或供应商退款写成财务调整单，应改用对应退款单。 - 以为财务调整单会进入资金流水，实际它只做调整留痕。 保存前检查清单 - 往来单位已选择正确。 - 关联合同已选择，调整归属明确。 - 本次分摊金额与审批或核销依据一致。 - 币种与合同或调整依据一致。 - 公司账户已选择为责任账户或核对账户。 - 备注写清调整类型、合同编号、金额、原因和是否真实收付。 - 已判断没有真实现金流；若有真实收付，应改用收付款、退款、费用或报销单。 - 如调整已确认，保存时选择“保存并已确认”。 步骤 01：进入财务调整单列表 进入“财务管理 财务调整单”。财务调整单用于处理尾差、折让、汇差、坏账等非收付款调整事项。 步骤 02：新建财务调整单草稿 点击“新增财务调整单”后进入草稿。草稿只保存待核对内容，不作为正式调整事实。 步骤 03：填写往来单位和基本信息 选择需要调整余额或留痕的往来单位，并确认日期、负责人、部门和币种。 步骤 04：选择需要调整的合同 选择关联合同，明确这笔尾差、折让或坏账调整归属到哪张销售或采购合同。 步骤 05：查看可分摊目标单据 选择往来单位后，分摊明细会显示该往来单位名下可调整的客户合同或采购合同。 步骤 06：填写本次调整金额 在目标合同行填写本次分摊金额。本例登记 dpl 合同尾差 usd 35.00。 步骤 07：核对调整合计 核对分摊行数和分摊金额。财务调整单金额来自分摊明细，不来自产品明细。 步骤 08：选择责任公司账户 财务调整单必须选择公司账户；没有真实收付时，这里作为责任账户或核对口径，不产生现金流水。 步骤 09：填写调整原因备注 备注要写清调整类型、合同编号、金额、原因，以及是否有真实收付款。 备注示例： text dpl 合同 ht2503110001 尾差核销 usd 35.00。该调整仅用于应收余额闭环，没有实际银行收付款，不进入资金流水。 步骤 10：准备保存财务调整单 保存前确认往来单位、关联合同、调整金额、责任账户和调整原因都已填写。 步骤 11：选择保存状态 资料未核对时保存草稿；调整已确认并可留痕时选择“保存并已确认”。 状态说明： 状态 适用情况 后续影响 --------- 保存到草稿 调整原因、金额或审批仍需核对 不作为正式调整记录 保存并已确认 财务主管或责任人已确认调整 形成正式调整记录，但不进入资金流水 步骤 12：保存并确认财务调整单 保存并已确认后，财务调整单成为正式调整记录。它不是实际现金事件，因此仍不会进入资金流水。 步骤 13：回到调整单列表验证 回到财务调整单列表搜索单号，确认状态、往来单位、关联合同和金额。 步骤 14：确认不进入资金流水 资金流水只展示真实现金事件。财务调整单用于留痕和余额调整，不会出现在现金流水明细中。 步骤 15：复核财务调整单明细 再次打开调整单，复核合同、分摊金额、责任账户和调整原因，确保后续审计可以追溯。"

    "searchable": "如何查看库存看板 如何查看库存看板 guides/看板报表/查看库存看板/readme.md 本指引用于培训仓管、销售、采购和管理层查看库存单。示例使用 dpl 的 size 3 产品，覆盖进入库存看板、理解统计口径、搜索 sku、读取当前库存/已锁定/可用库存/待入库/待出库、使用风险筛选、导出库存数据，以及确认何时需要切换到合同履约进度追溯来源。 适用场景 核心口径 步骤 01：进入库存看板 步骤 02：理解库存统计口径 步骤 03：查看筛选标签 步骤 04：搜索 sku 或产品 步骤 05：读取当前库存和锁定 步骤 06：读取可用库存 步骤 07：读取待入库和生产完成 步骤 08：读取待出库 步骤 09：筛选有可用库存 步骤 10：筛选已锁定 sku 步骤 11：筛选待入库 sku 步骤 12：筛选负库存风险 适用场景 - 仓库需要判断某个 sku 当前还有多少库存。 - 销售需要确认是否有可用库存可以承诺客户。 - 采购需要跟进已经生产完成但尚未入库的数量。 - 管理层需要快速查看库存风险、待入库和待出库压力。 - 需要导出库存单给仓库、业务或管理层离线核对。 核心口径 看板项 含义 数据来源 --------- sku 数 当前筛选条件下的 sku 行数 有效销售合同中的实物产品行 当前库存 已入库数量减去已出库数量 采购入库单 - 库存出库单 已锁定 已被申购单占用、尚未释放的库存 申购单锁定数量 - 已出库数量 可用库存 当前库存减去已锁定 当前库存 - 已锁定 待入库 供应商已生产完成但尚未实际入库 提货通知单 - 采购入库单 生产完成 供应商 ready / 可提货数量 已确认提货通知单 待出库 销售合同需求尚未出库的数量 销售合同数量 - 库存出库单 关键公式： text 当前库存 = 采购入库单数量 - 库存出库单数量 可用库存 = 当前库存 - 已锁定 待入库 = 提货通知单数量 - 采购入库单数量 待出库 = 销售合同数量 - 库存出库单数量 常见误读 - 把提货通知当成库存。提货通知只表示供应商 ready，不增加库存。 - 只看当前库存，不看已锁定。已经被申购锁定的库存不能随意承诺给其他合同。 - 把可用库存为负理解为系统错误。通常是库存锁定或出库已经发生，但入库事实尚未补齐，需要回源单核对。 - 只看待入库总数，不看具体 sku。不同 sku 的 ready 和入库进度必须分开判断。 - 用库存看板替代合同履约追溯。库存看板看数量，合同履约进度看销售合同闭环。 - 忽略筛选条件后导出。导出文件会按当前筛选和搜索结果生成。 查看前检查清单 - 是否进入了“库存管理 库存单”。 - 是否确认当前筛选标签和搜索条件。 - 是否区分当前库存、已锁定和可用库存。 - 是否区分生产完成、待入库和已入库事实。 - 是否检查待出库，判断销售合同尚未发货数量。 - 是否用“负库存风险”筛选检查异常 sku。 - 如需追溯来源，是否继续查看合同履约进度、提货通知、采购入库单或库存出库单。 步骤 01：进入库存看板 进入“库存管理 库存单”，先看顶部 sku 数、当前库存、可用库存、待入库和待出库。 步骤 02：理解库存统计口径 注意页面提示：库存单只统计实物产品。费用行、退款行和费用项产品不进入库存数量。 步骤 03：查看筛选标签 库存看板提供“全部、有可用库存、已锁定、待入库、待出库、负库存风险”筛选。 筛选说明： 筛选 适合查看 ------ 全部 当前所有可计算库存的 sku 有可用库存 可用库存大于 0 的 sku 已锁定 已被申购占用的 sku 待入库 已有提货通知但尚未完全入库的 sku 待出库 销售合同尚未完全出库的 sku 负库存风险 当前库存或可用库存为负的 sku 步骤 04：搜索 sku 或产品 输入产品编码、产品名称、规格或类型，可以快速定位某一个 sku。 步骤 05：读取当前库存和锁定 示例中 size 3 的当前库存为 12,000 pc，已锁定为 4,000 pc。当前库存来自实际入库和实际出库，已锁定来自申购占用。 步骤 06：读取可用库存 可用库存 = 当前库存 - 已锁定。示例中当前库存 12,000 pc，已锁定 4,000 pc，因此可用库存为 8,000 pc。 步骤 07：读取待入库和生产完成 待入库表示供应商已经生产完成或可提货，但仓库尚未完全入库。生产完成数量显示在待入库列下方。 步骤 08：读取待出库 待出库表示销售合同还有多少数量没有形成库存出库单。它适合用来判断后续发货压力。 步骤 09：筛选有可用库存 切到“有可用库存”，只看还能继续分配或出库的 sku。 步骤 10：筛选已锁定 sku 切到“已锁定”，查看哪些库存已经被申购单占用，避免同一批库存被重复承诺。 步骤 11：筛选待入库 sku 切到“待入库”，跟进供应商已经 ready 但仓库还没完全入库的 sku。需要核对来源时，应查看提货通知单和采购入库单。 步骤 12：筛选负库存风险 切到“负库存风险”，重点检查当前库存或可用库存为负的 sku。常见原因是库存已被锁定但还没有实际入库，或出库事实已经超过当前可用库存。 步骤 13：导出库存数据 需要离线核对或发给仓库时，可以导出库存单 csv 或 excel。导出内容按当前筛选和搜索结果生成。 步骤 14：确认追溯边界 库存看板用于判断 sku 数量，不展开每一张来源单据。需要追溯销售合同闭环时，进入“销售管理 合同履约进度”；需要追溯采购 ready 时，进入“采购管理 供应商生产完成看板”。 相关教程： - 如何查看合同履约进度 - 如何查看供应商生产完成看板 - 如何从提货通知下推采购入库单 - 如何创建库存出库单"

先看金额差异，再看状态和处理方式。 步骤 10：打开差异发票 点击发票号进入原始发票，核对来源单号、关联合同、开票金额、处理状态和差异处理方式。发票页面是更新处理状态的主要位置。 步骤 11：打开差异源单 点击源单号进入库存出库单或采购入库单，核对实际货物流转金额。判断发票差异时，不要只看发票，还要回到源单确认数量、单价和金额。 步骤 12：打印或导出发票差异 确认筛选条件和差异明细后，可以打印报表或导出 excel。导出前应明确本次是全部差异、销售差异还是采购差异。"

    "searchable": "如何维护合同模板 如何维护合同模板 guides/资料管理/维护合同模板/readme.md 本指引用于培训管理员或关键用户维护合同模板。合同模板控制客户 pi、销售合同、采购合同的导出结构，包括变量组、头字段、明细字段和模板内容，不替代业务单据本身的录入和审批。 适用场景 字段填写说明 步骤 01：进入合同模板 步骤 02：查看模板列表 步骤 03：搜索采购合同模板 步骤 04：打开现有模板 步骤 05：核对模板基础信息 步骤 06：核对变量和字段 步骤 07：新增合同模板 步骤 08：填写模板基础字段 步骤 09：填写变量和变量组 步骤 10：填写头字段和明细字段 步骤 11：填写模板内容和备注 步骤 12：保存后查看新模板 适用场景 - 需要新增一种 pi、销售合同或采购合同导出模板。 - 需要调整合同导出的头字段、明细列或变量范围。 - 需要区分客户模板和采购模板，避免单据套错模板。 - 业务团队发现导出文件缺少字段，需要确认模板配置。 - 新环境初始化后，需要核对默认模板是否符合公司标准。 字段填写说明 字段 填写方式 影响范围 --------- 模板编码 使用唯一编码，例如 tpl-c-pi-001 或 tpl-p-001 单据引用模板的稳定标识 模板名称 使用业务可读名称，例如“采购合同标准模板” 列表搜索和业务选择 模板类型 客户或采购 区分客户 pi/销售合同和采购合同 模板场景 pi、销售合同、采购合同 决定模板对应的业务场景 适用单据 填写报价单、客户合同、采购合同等 帮助用户判断适用范围 模板格式 html 或 word 决定导出模板格式 变量 以英文逗号分隔，例如 document.number,supplier.name,lines 模板内容可引用的数据 变量组 以英文逗号分隔，例如 document,supplier,terms,lines 列表展示和模板能力识别 头字段 以英文逗号分隔，例如 partner,paymentterm 控制合同头部展示字段 明细字段 以英文逗号分隔，例如 itemcode,itemname,quantity 控制产品明细行展示列 模板内容 使用文本或 html，并用 {{变量}} 占位 导出文件主体结构 备注 说明模板适用范围、维护口径或注意事项 便于后续维护 相关教程 - 如何维护公司资料 - 如何维护头信息模板 - 如何创建销售合同 - 如何创建采购合同 常见错误 - 模板类型和模板场景不匹配，例如采购模板却选择客户类型。 - 变量、变量组、头字段或明细字段使用中文逗号，导致拆分失败。 - 模板编码重复，保存时会覆盖或冲突。 - 只改模板内容，没有同步头字段和明细字段，导出仍缺少列。 - 把合同模板当作业务数据录入口。业务金额、客户、供应商、产品仍要在单据中维护。 保存前检查清单 - 模板编码是否唯一、稳定、符合命名规范。 - 模板类型、模板场景、适用单据是否一致。 - 变量、变量组、头字段、明细字段是否使用英文逗号分隔。 - 模板内容中的 {{变量}} 是否已包含在变量列表中。 - 保存后是否能在列表中搜索到该模板。 步骤 01：进入合同模板 进入“资料管理 / 合同模板”。这里维护客户 pi、销售合同、采购合同的导出结构。 步骤 02：查看模板列表 先查看模板列表。重点关注模板编码、模板类型、场景、适用单据、变量组和字段数。 步骤 03：搜索采购合同模板 可以按模板名称、编码、类型、场景或适用单据搜索。维护前先确认是否已有相同模板，避免重复创建。 步骤 04：打开现有模板 点击已有模板进入编辑。正式修改前先确认该模板影响的是 pi、销售合同还是采购合同。 步骤 05：核对模板基础信息 核对模板类型、模板场景和适用单据。三者决定模板会被哪个业务单据使用。 步骤 06：核对变量和字段 核对变量、变量组、头字段和明细字段。字段使用英文 key，多个值用英文逗号分隔。 步骤 07：新增合同模板 点击“新增合同模板”。新增前要明确模板服务哪个业务场景，避免创建重复模板。 步骤 08：填写模板基础字段 填写模板编码、名称、类型、场景、适用单据和格式。编码应稳定且不要重复。 步骤 09：填写变量和变量组 填写变量和变量组。变量决定模板内容可以引用哪些业务数据，变量组便于列表中快速识别模板能力。 步骤 10：填写头字段和明细字段 填写头字段和明细字段。头字段控制合同头部信息，明细字段控制产品行展示列。 步骤 11：填写模板内容和备注 填写模板内容和备注。模板内容可使用变量占位符，备注用于说明适用范围和维护口径。 步骤 12：保存后查看新模板 保存后回到列表搜索新模板。能看到新行，说明模板已经写入资料库。"

    "searchable": "采购履约与库存出入库 采购履约与库存出入库 guides/procurement-inventory/readme.md 本模块用于讲解采购合同后续如何登记供应商 ready、如何形成入库事实，以及销售出库如何扣减库存。 适用对象 操作步骤 1. 查看采购合同列表 2. 查看采购合同详情 3. 从采购合同下推提货通知 4. 查看提货通知列表 5. 查看提货通知详情 6. 从提货通知下推入库单 7. 查看采购入库列表 8. 新增或查看入库单详情 9. 核对入库产品明细 10. 查看库存出库列表 11. 新增或查看出库单详情 使用建议 适用对象 - 采购员。 - 仓管员。 - 销售/业务员在查看履约状态时参考。 - 财务在理解应付/应收来源时参考。 操作步骤 1. 查看采购合同列表 采购合同承接申购缺口，是供应商执行和后续提货通知的来源。 2. 查看采购合同详情 采购合同详情中确认供应商、采购产品、数量、价格和交付要求。 3. 从采购合同下推提货通知 供应商生产完成或可提货时，从采购合同下推提货通知单；这一步不会增加库存。 4. 查看提货通知列表 提货通知单用于记录供应商 ready / 待提货数量，是采购和仓库的交接入口。 5. 查看提货通知详情 提货通知详情只表示货已生产完成或可安排提货，不代表库存已经增加。 6. 从提货通知下推入库单 实际到库后从提货通知下推入库单。入库单保存确认后才形成库存增加事实。 7. 查看采购入库列表 采购入库单列表记录实际到库事实，后续也会作为采购发票和应付核对来源。 8. 新增或查看入库单详情 新增或下推入库单时，需要核对实际入库产品、数量、仓库、件数和重量。 9. 核对入库产品明细 入库明细是库存增加的事实来源，数量填错会影响库存、应付和报表。 10. 查看库存出库列表 库存出库单记录销售合同实际发货，是库存扣减和应收核对来源。 11. 新增或查看出库单详情 新增出库单时必须关联销售合同，并按实际发货产品和数量确认。 使用建议 - 采购合同确认供应商和采购要求。 - 提货通知只记录 ready / 待提货，不增加库存。 - 入库单才增加库存，并进入应付核对链路。 - 出库单才扣减库存，并进入应收核对链路。 - 仓管录入数量时应按实际收发货情况填写。 常见问题 - 提货通知为什么不算库存：提货通知只说明供应商 ready，货还没有实际入库。 - 什么时候做入库单：货物实际到库后做入库单。 - 什么时候做出库单：销售合同实际发货后做出库单。 - 为什么财务要看入库/出库：入库是应付核对来源，出库是应收核对来源。 采购合同列表  采购合同详情  下推提货通知  提货通知列表  提货通知详情  下推入库单  采购入库列表  入库单详情  入库产品明细  库存出库列表  出库单详情 "

    "searchable": "核心看板与核对截图指引 核心看板与核对 guides/core-dashboards/readme.md 本指引用于培训新用户查看核心看板。重点不是录入单据，而是学会从看板发现流程是否闭环、库存是否够用、财务余额是否需要跟进。 步骤 01：合同履约进度总览 步骤 02：展开 sku 履约明细 步骤 03：供应商生产完成看板 步骤 04：库存看板 步骤 05：应收看板 步骤 06：应付看板 步骤 07：应收账龄 步骤 08：应付账龄 步骤 09：资金流水 步骤 10：发票差异看板 讲解重点 讲解重点 - 看板用于发现问题，处理问题仍要回到具体业务单据。 - 合同履约进度看的是销售合同闭环。 - 供应商 ready 看板看的是采购侧生产完成和待入库。 - 库存看板以入库单和出库单为事实口径。 - 应收、应付和账龄用于判断资金风险。 - 资金流水只记录真实现金进出。 - 发票差异不阻止开票，但需要后续闭环处理。 步骤 01：合同履约进度总览 合同履约进度按销售合同汇总采购、生产完成、出库和收款状态。培训时强调：这里是履约进度，不是库存账。 步骤 02：展开 sku 履约明细 展开销售合同后，可以逐个 sku 查看采购合同、提货通知、出库单和收款单是否已经衔接。 步骤 03：供应商生产完成看板 供应商生产完成看板用于采购和仓库交接。ready 或待提货不代表库存增加，只有采购入库单才形成库存增加事实。 步骤 04：库存看板 库存看板按 sku 汇总当前库存、已锁定、可用库存、待入库和待出库。适合用来回答“现在有多少能发”“还有多少等入库”。 步骤 05：应收看板 应收看板按出库和销售发票追溯立账金额、已收金额和待收余额。财务可以从这里进入原始单据核对。 步骤 06：应付看板 应付看板按入库和采购发票追溯立账金额、已付金额和待付余额。采购和财务可用它核对供应商付款安排。 步骤 07：应收账龄 应收账龄按客户和账龄区间拆分未收余额，用于判断催收优先级。 步骤 08：应付账龄 应付账龄按供应商和账龄区间拆分未付余额，用于安排付款节奏和风险核对。 步骤 09：资金流水 资金流水只统计实际现金事件，例如收款单、付款单、退款单和费用单。发票本身不会进入现金流。 步骤 10：发票差异看板 发票差异看板用于核对销售发票与出库单、采购发票与入库单金额是否一致。发现差异后，应回到原始单据或后续退款、费用、调整流程闭环。"

    "searchable": "例外业务与专题报表截图指引 例外业务与专题报表 guides/exceptions-reports/readme.md 本指引用于培训客诉、退款、费用、报销、财务调整、版辊和经营分析等边缘模块。这些功能不是每笔订单都会使用，建议放在核心流程、核心看板和协作管理之后讲解。 步骤 01：客诉处理列表 步骤 02：新增客诉处理 步骤 03：客户退款列表 步骤 04：新增客户退款 步骤 05：供应商退款 步骤 06：费用单 步骤 07：报销单 步骤 08：财务调整单 步骤 09：版辊管理 步骤 10：新增版辊 步骤 11：版辊费台账 步骤 12：销售分析 步骤 13：采购分析 讲解重点 讲解重点 - 例外业务要先确认责任和来源单据，再登记处理结果。 - 退款、费用和报销只有形成实际收付时才影响资金流水。 - 财务调整用于处理非标准收付款，不应替代正常发票、收款或付款流程。 - 版辊专题需要同时看客户收费、供应商付款和返还条件。 - 销售分析和采购分析用于复盘结构，不是业务录入入口。 步骤 01：客诉处理列表 客诉处理单用于登记质量扣款、数量短少、包装破损、交期争议、下一单抵扣等例外事项。 步骤 02：新增客诉处理 新增客诉处理时需要关联来源销售合同，填写客诉金额、处理类型和原因。客诉不会自动替代退款或出库操作，后续仍要按处理方式闭环。 步骤 03：客户退款列表 客户退款单登记我司退还客户的实际出账，可用于客诉退款、超收退款或版辊返还。 步骤 04：新增客户退款 客户退款必须选择实际出账公司账户，并填写退款金额和关联来源。保存确认后才进入资金流水。 步骤 05：供应商退款 供应商退款单登记供应商退回超付款或差异款，是实际现金流入。 步骤 06：费用单 费用单用于登记物流、报关、银行手续费、港杂费等实际出账费用，可选关联合同。 步骤 07：报销单 报销单登记员工报销事项。只有已付款状态才会进入资金流水。 步骤 08：财务调整单 财务调整单用于处理尾差、折让、汇差、坏账等非标准收付款调整事项。 步骤 09：版辊管理 版辊管理统一追踪客户版辊收费、供应商版辊应付、达标返还和闭环状态。 步骤 10：新增版辊 新增版辊时要绑定客户、产品和供应商，并维护收费金额、应付金额和返还门槛。 步骤 11：版辊费台账 版辊费台账按客户和 sku 核对版辊费收取、客户退还、供应商付款和供应商退款。 步骤 12：销售分析 销售分析按客户合同明细统计销售额、数量和品类结构，支持按时间、客户和品类筛选。 步骤 13：采购分析 采购分析按供应商等往来单位汇总采购业务金额和单据数量，适合管理层复盘采购结构。"

      {
        "title": "主流程一：客户要报价",
        "html": "<p>员工需求：销售收到客户询价，需要快速给出可追溯的正式报价。</p><p>销售要做：</p><ol><li>确认客户档案、产品档案、币种和贸易条款是否完整。</li><li>创建报价单，选择客户、产品、数量、单价、交期和负责人。</li><li>如果产品涉及版辊费，在报价沟通时同步说明收费、达标返还规则和是否由客户承担。</li><li>报价保存确认后，对外导出或发送给客户。</li></ol><p>财务是否参与：报价阶段通常不做财务单据；如果报价涉及版辊费、预收款、特殊费用或信用风险，财务需要提前确认收款账户、币种和风险口径。</p><p>结果检查：</p><ul><li>报价单要能追溯到客户、产品和负责人。</li><li>销售金额对销售、财务、管理层可见；采购和仓管不应看到客户销售价格。</li><li>报价还不是库存事实，也不是应收事实。</li></ul>"

      {
        "title": "主流程七：供应商发票、付款和应付跟踪",
        "html": "<p>员工需求：供应商开票并要求付款，财务要从入库事实进入应付和付款闭环。</p><p>财务要做：</p><ol><li>从采购入库单生成采购发票，核对供应商、采购合同、产品、数量和开票金额。</li><li>如果发票金额和入库金额不同，进入发票差异看板跟踪原因。</li><li>银行实际付款后，从采购发票生成付款单或手动关联采购合同/入库单。</li><li>选择实际出账公司账户，确认付款金额。</li><li>在应付看板、应付账龄和资金流水中跟踪未付、逾期和实际付款。</li></ol><p>采购要看：</p><ul><li>可查看采购合同付款状态和供应商应付状态。</li><li>不录入付款单，不查看客户收款和客户应收。</li></ul><p>管理层要看：</p><ul><li>供应商付款压力、账龄、采购差异和资金安排。</li></ul><p>财务判断：</p><ul><li>采购发票确认正式应付。</li><li>付款单确认实际出账。</li><li>采购发票不进入资金流水，付款单进入资金流水。</li></ul>"
      },
      {
        "title": "分支流程一：客户投诉要求退款",
        "html": "<p>员工需求：客户反馈质量、数量、包装或交期问题，要求退款或赔付。</p><p>销售要做：</p><ol><li>先在客诉处理单登记客户、来源销售合同、问题类型、客诉金额、原因和处理方式。</li><li>上传或备注客户证据、沟通结论和内部责任判断。</li><li>如果需要退款，通知财务按客诉处理结果创建客户退款单。</li></ol><p>财务要做：</p><ol><li>核对客诉处理单、原销售合同、原收款或发票。</li><li>创建客户退款单，选择实际出账公司账户。</li><li>保存确认后，客户退款进入资金流水，冲减客户回款。</li><li>如果不是实际退款，而是折让、坏账、尾差或汇差，用财务调整单留痕。</li></ol><p>管理层要看：</p><ul><li>大额客诉、重复客诉客户、责任归属和是否影响利润。</li></ul><p>闭环标准：</p><ul><li>有来源销售合同。</li><li>有处理方式和金额。</li><li>有财务单据或调整记录。</li><li>应收、资金流水和差异看板能解释这笔退款。</li></ul>"
      },
      {
        "title": "分支流程二：客户投诉，约定下一单打折",
        "html": "<p>员工需求：客户不要求立即退款，而是要求下一单优惠。</p><p>销售要做：</p><ol><li>仍然先创建客诉处理单，处理方式写清楚“下一单抵扣/折扣”。</li><li>新一单报价或销售合同时，把折扣体现在单价、费用行或备注中。</li><li>关联原客诉编号，避免后续忘记抵扣来源。</li></ol><p>财务要做：</p><ol><li>判断折扣是否已经体现在新销售发票金额中。</li><li>如果发票金额和出库金额有差异，在发票差异看板标注原因。</li><li>如果需要单独留痕但没有实际收付，用财务调整单处理。</li></ol><p>闭环标准：</p><ul><li>原客诉有记录。</li><li>下一单价格或发票差异能解释折扣来源。</li><li>没有实际现金退款时，不要创建客户退款单。</li></ul>"
      },
      {
        "title": "分支流程三：达标给客户退版辊费",
        "html": "<p>员工需求：订单涉及版辊费，客户达到约定采购量或金额后，公司要退还客户版辊费。</p><p>销售要做：</p><ol><li>在报价或销售合同阶段说明版辊收费和达标返还规则。</li><li>在版辊管理中登记客户、产品、供应商、客户收费金额、返还门槛和关联销售合同。</li><li>达标后通知财务处理客户退款。</li></ol><p>采购要做：</p><ol><li>维护供应商版辊制作、应付金额、付款或返还条件。</li><li>如果供应商后续返还或抵扣版辊费，通知财务创建供应商退款单或付款调整。</li></ol><p>财务要做：</p><ol><li>用版辊费台账核对客户收费、供应商付款、达标状态和待退金额。</li><li>达标退给客户时，创建客户退款单并关联版辊费行。</li><li>供应商退回款项时，创建供应商退款单并选择入账账户。</li><li>资金流水核对客户退款出账和供应商退款入账。</li></ol><p>闭环标准：</p><ul><li>版辊记录能同时解释客户收费、供应商应付和达标返还。</li><li>客户退款单或供应商退款单必须体现实际现金流。</li><li>版辊费台账中不能长期留下无说明的未闭环差额。</li></ul>"
      },
      {
        "title": "分支流程四：发票差异和财务流程跟踪",
        "html": "<p>员工需求：发票金额和出入库金额不一致，或收付款金额和合同金额不一致，财务要能解释差异。</p><p>财务要做：</p><ol><li>打开发票差异看板，查看销售发票与出库单、采购发票与入库单的差异。</li><li>按原因选择处理方式：补充费用、退款、红冲重开、折让、汇差、坏账或财务调整。</li><li>发生实际收付时，用收款单、付款单、客户退款单、供应商退款单、费用单或已付款报销单记录现金事件。</li><li>没有实际收付但需要留痕时，用财务调整单。</li><li>最后在资金流水、应收账龄、应付账龄中复核余额。</li></ol><p>管理层要看：</p><ul><li>哪些差异未处理。</li><li>哪些客户逾期未收。</li><li>哪些供应商待付影响交付。</li><li>资金流入、流出和净额是否符合经营预期。</li></ul><p>审计要看：</p><ul><li>单据是否能从销售合同追溯到采购、库存、发票和收付款。</li><li>附件是否归档。</li><li>权限是否符合角色边界。</li></ul>"
      },
      {
        "title": "角色工作场景清单",
        "html": "<h4>销售/业务员</h4><p>每天打开系统时，销售关心的是客户需求和订单是否顺利交付：</p><ul><li>今天有没有新客户询价要报价。</li><li>已报价客户是否确认下单。</li><li>销售合同是否已经下推申购。</li><li>采购、生产完成、入库、出库是否卡住。</li><li>客户是否付款，是否逾期。</li><li>客诉是否已经登记、退款或下一单折扣是否闭环。</li><li>版辊费是否达到返还条件。</li></ul><p>销售不应该直接处理：</p><ul><li>采购单价、供应商付款、采购发票。</li><li>公司资金流水全表。</li><li>用户权限和系统设置。</li></ul><h4>采购员</h4><p>采购关心的是供应商能不能按销售需求交货：</p><ul><li>哪些申购单有采购缺口。</li><li>哪些缺口已经下推采购合同。</li><li>哪些供应商已生产完成、待提货或延期。</li><li>哪些货已入库，哪些还在路上。</li><li>供应商发票和付款状态是否影响继续生产。</li><li>供应商版辊费用是否已登记、付款或返还。</li></ul><p>采购不应该直接处理：</p><ul><li>客户报价单价、客户应收和客户收款。</li><li>销售利润和资金流水全表。</li></ul><h4>仓管员</h4><p>仓管关心的是实物有没有进出仓：</p><ul><li>哪些提货通知需要准备收货。</li><li>哪些货实际入库，数量、仓库、件数和重量是否正确。</li><li>哪些销售合同需要出库。</li><li>出库后库存是否足够，是否出现负库存或数量差异。</li></ul><p>仓管不应该直接处理：</p><ul><li>销售价格、采购价格。</li><li>收款、付款、退款、费用和发票。</li></ul><h4>财务</h4><p>财务关心的是发票、收付款和资金闭环：</p><ul><li>出库后是否已开销售发票。</li><li>销售发票后客户是否已付款。</li><li>入库后是否已收到采购发票。</li><li>采购发票后是否已付款给供应商。</li><li>客诉退款、供应商退款、费用、报销、财务调整是否有来源和审批依据。</li><li>版辊费是否该退、是否已退、资金是否入账或出账。</li><li>应收应付账龄、资金流水和发票差异是否能解释。</li></ul><p>财务不应该直接修改：</p><ul><li>销售合同业务明细。</li><li>采购合同业务明细。</li><li>仓库实际入库和出库数量。</li></ul><h4>管理层</h4><p>管理层关心的是风险和经营结果：</p><ul><li>哪些合同履约卡住。</li><li>哪些供应商生产完成但未入库。</li><li>哪些库存不足或长时间未出库。</li><li>哪些客户逾期未收。</li><li>哪些供应商待付影响交付。</li><li>哪些客诉、退款、发票差异和版辊费未闭环。</li><li>销售、采购和资金结构是否健康。</li></ul><p>管理层默认只看不改，避免绕过业务责任人。</p><h4>只读审计</h4><p>审计关心的是追溯和内控：</p><ul><li>单据是否按销售合同串起来。</li><li>财务单据是否关联来源单据。</li><li>现金流水是否只来自实际收付、退款、费用或已付款报销。</li><li>角色是否越权查看或修改敏感字段。</li><li>附件和合同 folder 是否完整。</li></ul><p>审计不新增、不编辑、不下推、不作废。</p>"
      },
      {
        "title": "端到端验收清单",
        "html": "<p>一条完整外贸业务至少要能回答这些问题：</p><table><thead><tr><th>问题</th><th>应查看的系统证据</th></tr></thead><tbody><tr><td>客户最初要了什么价格和条款？</td><td>报价单、报价附件</td></tr><tr><td>客户最终下了什么订单？</td><td>销售合同、合同 folder</td></tr><tr><td>库存够不够？缺口是多少？</td><td>申购单、库存看板</td></tr><tr><td>缺口采购给了哪个供应商？</td><td>采购合同</td></tr><tr><td>供应商货是否生产完成？</td><td>提货通知、供应商生产完成看板</td></tr><tr><td>货是否实际入库？</td><td>采购入库单</td></tr><tr><td>是否实际发给客户？</td><td>库存出库单</td></tr><tr><td>客户是否开票和付款？</td><td>销售发票、收款单、应收看板、资金流水</td></tr><tr><td>供应商是否开票和付款？</td><td>采购发票、付款单、应付看板、资金流水</td></tr><tr><td>客诉怎么处理？</td><td>客诉处理单、客户退款单或财务调整单</td></tr><tr><td>下一单折扣有没有兑现？</td><td>原客诉处理单、新报价/销售合同、发票差异或财务调整</td></tr><tr><td>版辊费是否达标返还？</td><td>版辊管理、版辊费台账、客户退款单</td></tr><tr><td>财务余额是否准确？</td><td>应收账龄、应付账龄、发票差异看板、资金流水</td></tr></tbody></table>"
      },
      {
        "title": "外贸常见场景覆盖清单",
        "html": "<p>这些场景不是每一单都会发生，但培训和验收时应知道由哪个角色发起、是否需要财务参与。</p><table><thead><tr><th>员工实际业务需求</th><th>发起角色</th><th>参与角色</th><th>系统处理方式</th><th>财务参与</th></tr></thead><tbody><tr><td>新客户第一次询价，需要建立往来资料</td><td>销售</td><td>财务、审计</td><td>新增客户档案，维护联系人、地址、付款条款和必要附件</td><td>财务核对付款条款、币种和收款账户口径</td></tr><tr><td>新供应商第一次合作，需要建立付款资料</td><td>采购</td><td>财务、审计</td><td>新增供应商档案，维护联系人、银行账户和采购条款</td><td>财务核对供应商收款账户和付款风险</td></tr><tr><td>新产品第一次报价，需要维护规格</td><td>销售</td><td>采购、仓管</td><td>新增产品档案，维护 SKU、规格、单位和属性</td><td>通常不参与；涉及版辊、费用或税务口径时参与</td></tr><tr><td>客户要求样品或小批量试单</td><td>销售</td><td>采购、仓管、财务</td><td>用报价、销售合同、申购、采购、出入库按同一主线处理</td><td>收样品费、退样品费或承担样品费时用收款、退款、费用或调整</td></tr><tr><td>客户要求预付款后生产</td><td>销售</td><td>财务、采购</td><td>销售合同确认付款条款，采购按合同推进</td><td>财务先登记收款单，后续销售发票和尾款继续跟踪</td></tr><tr><td>客户分批出货</td><td>销售</td><td>仓管、财务</td><td>同一销售合同下多张库存出库单</td><td>每批出库可分别开票、收款和跟踪应收</td></tr><tr><td>供应商分批交货</td><td>采购</td><td>仓管、财务</td><td>同一采购合同下多张提货通知和入库单</td><td>每批入库可分别收票、付款和跟踪应付</td></tr><tr><td>供应商生产延期</td><td>采购</td><td>销售、管理层</td><td>在提货通知、生产完成看板和备注中跟踪</td><td>若产生罚款、折让或费用，用供应商退款、费用或财务调整闭环</td></tr><tr><td>客户要求改规格或改数量</td><td>销售</td><td>采购、仓管、财务</td><td>更新或新建销售合同，并检查申购、采购和库存影响</td><td>金额变化影响发票、收款、退款或财务调整</td></tr><tr><td>出口前发现库存不够</td><td>仓管</td><td>销售、采购</td><td>库存看板和申购缺口提示，采购补齐缺口</td><td>通常不参与；若紧急采购费用增加，用费用单或调整记录</td></tr><tr><td>物流、报关、港杂或银行手续费发生</td><td>财务</td><td>销售、采购</td><td>创建费用单，可关联合同</td><td>费用单保存确认后进入资金流水</td></tr><tr><td>员工垫付费用需要报销</td><td>员工/财务</td><td>管理层</td><td>创建报销单，记录线下确认和费用明细</td><td>已付款报销单进入资金流水</td></tr><tr><td>客户多付或重复付款</td><td>财务</td><td>销售</td><td>收款单记录实际到账，客户退款单处理退回</td><td>客户退款单进入资金流水并冲减客户余额</td></tr><tr><td>供应商多收或退回差异款</td><td>财务</td><td>采购</td><td>供应商退款单关联原付款或采购发票</td><td>供应商退款单进入资金流水并冲减供应商余额</td></tr><tr><td>客户质量客诉要求现金退款</td><td>销售</td><td>财务、管理层</td><td>客诉处理单登记责任和金额，客户退款单执行</td><td>客户退款单必须选择实际出账账户</td></tr><tr><td>客户质量客诉要求下一单折扣</td><td>销售</td><td>财务、管理层</td><td>客诉处理单登记下一单抵扣，新报价/销售合同体现折扣</td><td>财务核对发票差异；无现金流时用财务调整留痕</td></tr><tr><td>客户短少、破损或交期争议扣款</td><td>销售</td><td>仓管、采购、财务</td><td>客诉处理单记录问题，必要时追溯出库、入库和供应商责任</td><td>退款、供应商退款、费用或财务调整按处理结果选择</td></tr><tr><td>版辊费收取、付款和达标返还</td><td>销售</td><td>采购、财务、管理层</td><td>版辊管理和版辊费台账追踪客户、供应商和达标状态</td><td>客户退款、供应商付款或供应商退款必须进入资金流水</td></tr><tr><td>销售发票金额和出库金额不一致</td><td>财务</td><td>销售、管理层</td><td>发票差异看板跟踪差异原因</td><td>用补充收款、客户退款、红冲重开或财务调整闭环</td></tr><tr><td>采购发票金额和入库金额不一致</td><td>财务</td><td>采购、管理层</td><td>发票差异看板跟踪差异原因</td><td>用补充付款、供应商退款、红冲重开、费用单或财务调整闭环</td></tr><tr><td>外币收付款出现汇差</td><td>财务</td><td>管理层</td><td>财务调整单记录汇差</td><td>有实际银行流水时用收付款，汇差本身用调整留痕</td></tr><tr><td>客户长期不付款，需要坏账处理</td><td>财务</td><td>销售、管理层、审计</td><td>应收账龄定位风险，财务调整单记录坏账处理</td><td>财务调整不等于现金流，不进入资金流水</td></tr><tr><td>管理层要看一单是否真正闭环</td><td>管理层</td><td>销售、采购、仓管、财务</td><td>合同履约、应收应付、资金流水、发票差异、版辊台账联查</td><td>必须能解释未收、未付、退款、费用和差异</td></tr><tr><td>审计要查一笔订单完整证据</td><td>审计</td><td>各业务角色</td><td>只读查看合同、附件、下游单据、报表和资金记录</td><td>不操作财务，只核对来源、金额、账户和权限记录</td></tr></tbody></table>"
      },
      {
        "title": "后续教程写作规范",
        "html": "<p>在 <code>guides/</code> 继续增加教程时，标题和正文必须从某个角色的真实业务需求出发。</p><p>推荐标题写法：</p><ul><li><code>销售收到客户确认后，如何把报价转成可执行销售合同</code></li><li><code>采购收到申购缺口后，如何给供应商下采购合同</code></li><li><code>仓管收到提货通知后，如何确认实际入库</code></li><li><code>财务收到客户到账后，如何登记收款并核对应收</code></li><li><code>销售收到客诉后，如何选择退款、下一单折扣或财务调整</code></li></ul><p>不推荐标题写法：</p><ul><li><code>报价单表单说明</code></li><li><code>采购合同字段说明</code></li><li><code>收款单页面介绍</code></li></ul><p>每篇教程至少包含：</p><ul><li>这个角色为什么要做这件事。</li><li>上一步是谁交接过来的。</li><li>本角色在系统里完成哪些动作。</li><li>如果需要财务处理，财务必须做哪些单据和核对。</li><li>下一步交给哪个角色。</li><li>哪些报表或看板可以确认流程闭环。</li><li>至少一张与该业务动作相关的 demo 截图。</li></ul>"
      },
      {
        "title": "任务级教程索引",
        "html": "<p>需要进一步看具体点击路径时，再进入这些任务级教程：</p><ul><li><a href=\"../sales-quotation-contract/README.md\">销售流程：报价单到销售合同</a></li><li><a href=\"../sales-to-purchase/README.md\">销售到采购：销售合同、申购单、采购合同</a></li><li><a href=\"../procurement-inventory/README.md\">采购履约与库存出入库</a></li><li><a href=\"../finance-invoices-payments/README.md\">财务流程：发票、收款、付款</a></li><li><a href=\"../exceptions-reports/README.md\">例外业务与专题报表</a></li><li><a href=\"../core-dashboards/README.md\">核心看板与核对</a></li><li><a href=\"../05-role-guides.md\">不同角色日常操作</a></li></ul>"
      }

er 上传附件。 4. 合同确认后下推申购单，让采购和仓库知道需求。 管理层要看： 重点合同金额、交期、客户风险和是否需要特殊审批。 合同履约进度中采购、生产完成、出库、收款是否卡住。 财务是否参与：客户合同本身不产生现金流水；但财务需要关注付款条款、币种、收款账户、开票要求和后续应收风险。 结果检查： 销售合同是后续申购、采购、库存、发票、收款和文档归档的核心源头。 采购只能看到采购所需字段，不应看到客户销售金额。 仓管只需要产品、规格、数量和库存动作，不需要看到金额。 主流程三：判断库存并转采购 员工需求：客户下单后，公司要先判断库存够不够，不够的部分再采购。 销售要做： 1. 从销售合同下推申购单。 2. 查看申购单是否占用了可用库存，以及还差多少需要采购。 3. 把采购进度反馈给客户，但不介入采购价格。 采购要做： 1. 打开申购单，确认采购缺口数量。 2. 从申购单下推采购合同。 3. 选择供应商，确认采购价格、交期、币种和交付要求。 4. 如有版辊制作，采购同步维护供应商侧版辊应付或制作进度。 财务是否参与：申购单和采购合同还不等于付款；财务可以查看采购合同金额和付款条款，但实际应付要等入库和采购发票。 结果检查： 采购合同只承接申购缺口，不应绕过申购直接把全部销售数量重复采购。 采购员可见采购金额和应付状态；销售不应看到采购单价、采购总额和供应商付款信息。 主流程四：供应商下单后生产完成 员工需求：供应商通知货做好了，采购要通知仓库和业务，但不能把未到库的货当成库存。 采购要做： 1. 在供应商生产完成看板查看每个采购合同和 sku 的 ready 状态。 2. 从采购合同下推提货通知单，登记本次已生产完成或待提货数量。 3. 维护预计提货日期、物流备注和异常说明。 仓管要做： 1. 根据提货通知安排收货准备。 2. 明确提货通知不是入库，不能把 ready 数量当作可用库存发给客户。 财务是否参与：提货通知不触发应付、不进入资金流水。财务只在需要预付款、物流费用或供应商对账时关注。 结果检查： ready / 待提货只代表供应商侧状态。 只有采购入库单才增加库存，并进入采购发票核对。 主流程五：供应商发货、我司入库、客户出库 员工需求：货物实际移动后，仓库要把数量事实录入系统，销售和财务据此跟踪履约和收付款。 仓管入库要做： 1. 货物实际到库后，从提货通知下推采购入库单。 2. 核对产品、数量、仓库、件数、净重、毛重。 3. 保存确认后形成库存增加事实。 仓管出库要做： 1. 客户订单准备发货时，创建库存出库单并关联销售合同。 2. 按实际发货数量填写出库明细。 3. 保存确认后形成库存扣减事实。 销售要看： 销售合同履约进度中，采购覆盖、生产完成、入库、出库和收款是否闭环。 如果客户分批发货，每批都要有对应出库记录。 财务要看： 入库单是采购发票和应付核对来源。 出库单是销售发票和应收核对来源。 入库/出库本身不是现金流水，只有后续收付款、退款、费用和已付款报销才进入资金流水。 结果检查： 供应商直接发到客户时，也需要按公司内控要求保留可追溯库存事实。常见做法是通过虚拟仓或先入后出的方式记录入库、出库，确保应付和应收都有来源。 仓管不应录入或修改销售单价、采购单价和财务收付信息。 主流程六：销售发票、收款和应收跟踪 员工需求：客户要正式发票或公司要确认应收，财务需要从出库事实进入开票和收款闭环。 财务要做： 1. 从库存出库单生成销售发票，核对客户、销售合同、产品、数量和开票金额。 2. 如果发票金额和出库金额不同，保留差异原因，后续在发票差异看板跟进。 3. 银行实际到账后，从销售发票生成收款单或手动关联合同/出库单。 4. 选择实际入账公司账户，确认收款金额。 5. 在应收看板、应收账龄和资金流水中跟踪未收、逾期和实际到账。 销售要看： 只看本人客户的应收状态、待收和逾期提示，用于催收。 不进入资金流水全表，不查看供应商付款。 管理层要看： 大额应收、逾期账龄、客户回款表现和异常差异。 财务判断： 发票确认正式应收。 收款单确认实际到账。 发票不进入资金流水，收款单进入资金流水。 主流程七：供应商发票、付款和应付跟踪 员工需求：供应商开票并要求付款，财务要从入库事实进入应付和付款闭环。 财务要做： 1. 从采购入库单生成采购发票，核对供应商、采购合同、产品、数量和开票金额。 2. 如果发票金额和入库金额不同，进入发票差异看板跟踪原因。 3. 银行实际付款后，从采购发票生成付款单或手动关联采购合同/入库单。 4. 选择实际出账公司账户，确认付款金额。 5. 在应付看板、应付账龄和资金流水中跟踪未付、逾期和实际付款。 采购要看： 可查看采购合同付款状态和供应商应付状态。 不录入付款单，不查看客户收款和客户应收。 管理层要看： 供应商付款压力、账龄、采购差异和资金安排。 财务判断： 采购发票确认正式应付。 付款单确认实际出账。 采购发票不进入资金流水，付款单进入资金流水。 分支流程一：客户投诉要求退款 员工需求：客户反馈质量、数量、包装或交期问题，要求退款或赔付。 销售要做： 1. 先在客诉处理单登记客户、来源销售合同、问题类型、客诉金额、原因和处理方式。 2. 上传或备注客户证据、沟通结论和内部责任判断。 3. 如果需要退款，通知财务按客诉处理结果创建客户退款单。 财务要做： 1. 核对客诉处理单、原销售合同、原收款或发票。 2. 创建客户退款单，选择实际出账公司账户。 3. 保存确认后，客户退款进入资金流水，冲减客户回款。 4. 如果不是实际退款，而是折让、坏账、尾差或汇差，用财务调整单留痕。 管理层要看： 大额客诉、重复客诉客户、责任归属和是否影响利润。 闭环标准： 有来源销售合同。 有处理方式和金额。 有财务单据或调整记录。 应收、资金流水和差异看板能解释这笔退款。 分支流程二：客户投诉，约定下一单打折 员工需求：客户不要求立即退款，而是要求下一单优惠。 销售要做： 1. 仍然先创建客诉处理单，处理方式写清楚“下一单抵扣/折扣”。 2. 新一单报价或销售合同时，把折扣体现在单价、费用行或备注中。 3. 关联原客诉编号，避免后续忘记抵扣来源。 财务要做： 1. 判断折扣是否已经体现在新销售发票金额中。 2. 如果发票金额和出库金额有差异，在发票差异看板标注原因。 3. 如果需要单独留痕但没有实际收付，用财务调整单处理。 闭环标准： 原客诉有记录。 下一单价格或发票差异能解释折扣来源。 没有实际现金退款时，不要创建客户退款单。 分支流程三：达标给客户退版辊费 员工需求：订单涉及版辊费，客户达到约定采购量或金额后，公司要退还客户版辊费。 销售要做： 1. 在报价或销售合同阶段说明版辊收费和达标返还规则。 2. 在版辊管理中登记客户、产品、供应商、客户收费金额、返还门槛和关联销售合同。 3. 达标后通知财务处理客户退款。 采购要做： 1. 维护供应商版辊制作、应付金额、付款或返还条件。 2. 如果供应商后续返还或抵扣版辊费，通知财务创建供应商退款单或付款调整。 财务要做： 1. 用版辊费台账核对客户收费、供应商付款、达标状态和待退金额。 2. 达标退给客户时，创建客户退款单并关联版辊费行。 3. 供应商退回款项时，创建供应商退款单并选择入账账户。 4. 资金流水核对客户退款出账和供应商退款入账。 闭环标准： 版辊记录能同时解释客户收费、供应商应付和达标返还。 客户退款单或供应商退款单必须体现实际现金流。 版辊费台账中不能长期留下无说明的未闭环差额。 分支流程四：发票差异和财务流程跟踪 员工需求：发票金额和出入库金额不一致，或收付款金额和合同金额不一致，财务要能解释差异。 财务要做： 1. 打开发票差异看板，查看销售发票与出库单、采购发票与入库单的差异。 2. 按原因选择处理方式：补充费用、退款、红冲重开、折让、汇差、坏账或财务调整。 3. 发生实际收付时，用收款单、付款单、客户退款单、供应商退款单、费用单或已付款报销单记录现金事件。 4. 没有实际收付但需要留痕时，用财务调整单。 5. 最后在资金流水、应收账龄、应付账龄中复核余额。 管理层要看： 哪些差异未处理。 哪些客户逾期未收。 哪些供应商待付影响交付。 资金流入、流出和净额是否符合经营预期。 审计要看： 单据是否能从销售合同追溯到采购、库存、发票和收付款。 附件是否归档。 权限是否符合角色边界。 角色工作场景清单 销售/业务员 每天打开系统时，销售关心的是客户需求和订单是否顺利交付： 今天有没有新客户询价要报价。 已报价客户是否确认下单。 销售合同是否已经下推申购。 采购、生产完成、入库、出库是否卡住。 客户是否付款，是否逾期。 客诉是否已经登记、退款或下一单折扣是否闭环。 版辊费是否达到返还条件。 销售不应该直接处理： 采购单价、供应商付款、采购发票。 公司资金流水全表。 用户权限和系统设置。 采购员 采购关心的是供应商能不能按销售需求交货： 哪些申购单有采购缺口。 哪些缺口已经下推采购合同。 哪些供应商已生产完成、待提货或延期。 哪些货已入库，哪些还在路上。 供应商发票和付款状态是否影响继续生产。 供应商版辊费用是否已登记、付款或返还。 采购不应该直接处理： 客户报价单价、客户应收和客户收款。 销售利润和资金流水全表。 仓管员 仓管关心的是实物有没有进出仓： 哪些提货通知需要准备收货。 哪些货实际入库，数量、仓库、件数和重量是否正确。 哪些销售合同需要出库。 出库后库存是否足够，是否出现负库存或数量差异。 仓管不应该直接处理： 销售价格、采购价格。 收款、付款、退款、费用和发票。 财务 财务关心的是发票、收付款和资金闭环： 出库后是否已开销售发票。 销售发票后客户是否已付款。 入库后是否已收到采购发票。 采购发票后是否已付款给供应商。 客诉退款、供应商退款、费用、报销、财务调整是否有来源和审批依据。 版辊费是否该退、是否已退、资金是否入账或出账。 应收应付账龄、资金流水和发票差异是否能解释。 财务不应该直接修改： 销售合同业务明细。 采购合同业务明细。 仓库实际入库和出库数量。 管理层 管理层关心的是风险和经营结果： 哪些合同履约卡住。 哪些供应商生产完成但未入库。 哪些库存不足或长时间未出库。 哪些客户逾期未收。 哪些供应商待付影响交付。 哪些客诉、退款、发票差异和版辊费未闭环。 销售、采购和资金结构是否健康。 管理层默认只看不改，避免绕过业务责任人。 只读审计 审计关心的是追溯和内控： 单据是否按销售合同串起来。 财务单据是否关联来源单据。 现金流水是否只来自实际收付、退款、费用或已付款报销。 角色是否越权查看或修改敏感字段。 附件和合同 folder 是否完整。 审计不新增、不编辑、不下推、不作废。 端到端验收清单 一条完整外贸业务至少要能回答这些问题： 问题 应查看的系统证据 客户最初要了什么价格和条款？ 报价单、报价附件 客户最终下了什么订单？ 销售合同、合同 folder 库存够不够？缺口是多少？ 申购单、库存看板 缺口采购给了哪个供应商？ 采购合同 供应商货是否生产完成？ 提货通知、供应商生产完成看板 货是否实际入库？ 采购入库单 是否实际发给客户？ 库存出库单 客户是否开票和付款？ 销售发票、收款单、应收看板、资金流水 供应商是否开票和付款？ 采购发票、付款单、应付看板、资金流水 客诉怎么处理？ 客诉处理单、客户退款单或财务调整单 下一单折扣有没有兑现？ 原客诉处理单、新报价/销售合同、发票差异或财务调整 版辊费是否达标返还？ 版辊管理、版辊费台账、客户退款单 财务余额是否准确？ 应收账龄、应付账龄、发票差异看板、资金流水 外贸常见场景覆盖清单 这些场景不是每一单都会发生，但培训和验收时应知道由哪个角色发起、是否需要财务参与。 员工实际业务需求 发起角色 参与角色 系统处理方式 财务参与 新客户第一次询价，需要建立往来资料 销售 财务、审计 新增客户档案，维护联系人、地址、付款条款和必要附件 财务核对付款条款、币种和收款账户口径 新供应商第一次合作，需要建立付款资料 采购 财务、审计 新增供应商档案，维护联系人、银行账户和采购条款 财务核对供应商收款账户和付款风险 新产品第一次报价，需要维护规格 销售 采购、仓管 新增产品档案，维护 sku、规格、单位和属性 通常不参与；涉及版辊、费用或税务口径时参与 客户要求样品或小批量试单 销售 采购、仓管、财务 用报价、销售合同、申购、采购、出入库按同一主线处理 收样品费、退样品费或承担样品费时用收款、退款、费用或调整 客户要求预付款后生产 销售 财务、采购 销售合同确认付款条款，采购按合同推进 财务先登记收款单，后续销售发票和尾款继续跟踪 客户分批出货 销售 仓管、财务 同一销售合同下多张库存出库单 每批出库可分别开票、收款和跟踪应收 供应商分批交货 采购 仓管、财务 同一采购合同下多张提货通知和入库单 每批入库可分别收票、付款和跟踪应付 供应商生产延期 采购 销售、管理层 在提货通知、生产完成看板和备注中跟踪 若产生罚款、折让或费用，用供应商退款、费用或财务调整闭环 客户要求改规格或改数量 销售 采购、仓管、财务 更新或新建销售合同，并检查申购、采购和库存影响 金额变化影响发票、收款、退款或财务调整 出口前发现库存不够 仓管 销售、采购 库存看板和申购缺口提示，采购补齐缺口 通常不参与；若紧急采购费用增加，用费用单或调整记录 物流、报关、港杂或银行手续费发生 财务 销售、采购 创建费用单，可关联合同 费用单保存确认后进入资金流水 员工垫付费用需要报销 员工/财务 管理层 创建报销单，记录线下确认和费用明细 已付款报销单进入资金流水 客户多付或重复付款 财务 销售 收款单记录实际到账，客户退款单处理退回 客户退款单进入资金流水并冲减客户余额 供应商多收或退回差异款 财务 采购 供应商退款单关联原付款或采购发票 供应商退款单进入资金流水并冲减供应商余额 客户质量客诉要求现金退款 销售 财务、管理层 客诉处理单登记责任和金额，客户退款单执行 客户退款单必须选择实际出账账户 客户质量客诉要求下一单折扣 销售 财务、管理层 客诉处理单登记下一单抵扣，新报价/销售合同体现折扣 财务核对发票差异；无现金流时用财务调整留痕 客户短少、破损或交期争议扣款 销售 仓管、采购、财务 客诉处理单记录问题，必要时追溯出库、入库和供应商责任 退款、供应商退款、   <script>
    const manualGuides = JSON.parse(document.querySelector('#manual-data').textContent)

    const state = {
      guides: manualGuides,
      filtered: manualGuides,
      category: '全部',
      query: '',
      selectedPath: '',
    }

    const guideList = document.querySelector('#guideList')
    const categoryList = document.querySelector('#categoryList')
    const detail = document.querySelector('#detail')
    const loading = document.querySelector('#loading')
    const searchInput = document.querySelector('#searchInput')
    const guideCount = document.querySelector('#guideCount')
    const shotCount = document.querySelector('#shotCount')
    const expandFirst = document.querySelector('#expandFirst')

    init()

    function init() {
      guideCount.textContent = String(state.guides.length)
      shotCount.textContent = String(state.guides.reduce((sum, guide) => sum + guide.steps.length, 0))
      loading.remove()
      renderCategories()
      renderGuideList()
      selectFromHash()
    }

    function renderCategories() {
      const counts = new Map()
      for (const guide of state.guides) counts.set(guide.category, (counts.get(guide.category) || 0) + 1)
      const categories = ['全部', ...Array.from(counts.keys()).sort((a, b) => a.localeCompare(b, 'zh-CN'))]
      categoryList.innerHTML = categories.map((category) => {
        const count = category === '全部' ? state.guides.length : counts.get(category)
        return '<button class="category-button' + (state.category === category ? ' active' : '') + '" data-category="' + escapeHtml(category) + '"><span>' + escapeHtml(category) + '</span><small>' + count + '</small></button>'
      }).join('')
      categoryList.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.category = button.dataset.category
          applyFilters()
        })
      })
    }

    function applyFilters() {
      const query = state.query.trim().toLowerCase()
      state.filtered = state.guides.filter((guide) => {
        const categoryMatch = state.category === '全部' || guide.category === state.category
        const queryMatch = !query || guide.searchable.includes(query)
        return categoryMatch && queryMatch
      })
      renderCategories()
      renderGuideList()
    }

    function renderGuideList() {
      if (!state.filtered.length) {
        guideList.innerHTML = '<div class="empty">没有匹配的教程。</div>'
        return
      }
      guideList.innerHTML = state.filtered.map((guide) =>
        '<button class="guide-card' + (state.selectedPath === guide.path ? ' active' : '') + '" data-path="' + escapeHtml(guide.path) + '">' +
          '<strong>' + escapeHtml(guide.title) + '</strong>' +
          '<span class="guide-meta">' +
            '<span class="pill">' + escapeHtml(guide.category) + '</span>' +
            '<span>' + guide.sections.length + ' 个说明区块</span>' +
            '<span>' + guide.steps.length + ' 张截图</span>' +
          '</span>' +
        '</button>'
      ).join('')
      guideList.querySelectorAll('.guide-card').forEach((card) => {
        card.addEventListener('click', () => selectGuide(card.dataset.path))
      })
    }

    function selectGuide(path) {
      const guide = state.guides.find((item) => item.path === path)
      if (!guide) return
      state.selectedPath = path
      window.history.replaceState(null, '', '#' + encodeURIComponent(path))
      renderGuideList()
      renderDetail(guide)
    }

    function renderDetail(guide) {
      const tocItems = [
        ...guide.sections.map((section, index) => ({ label: section.title, target: 'section-' + index })),
        ...guide.steps.map((step, index) => ({ label: step.title, target: 'step-' + index })),
      ].slice(0, 18)
      const toc = tocItems.length
        ? '<div class="toc">' + tocItems.map((item) => '<button data-target="' + escapeHtml(item.target) + '">' + escapeHtml(item.label) + '</button>').join('') + '</div>'
        : ''
      const sections = guide.sections.map((section, index) =>
        '<article class="manual-section" id="section-' + index + '">' +
          '<h4>' + escapeHtml(section.title) + '</h4>' +
          '<div class="section-body">' + section.html + '</div>' +
        '</article>'
      ).join('')
      const steps = guide.steps.length
        ? guide.steps.map((step, index) =>
          '<article class="step" id="step-' + index + '">' +
            '<div class="step-title"><span>' + String(index + 1).padStart(2, '0') + '</span>' + escapeHtml(step.title) + '</div>' +
            '<img src="' + escapeHtml(step.src) + '" alt="' + escapeHtml(step.title) + '" loading="lazy" />' +
            (step.html ? '<div class="step-body">' + step.html + '</div>' : '') +
          '</article>'
        ).join('')
        : '<div class="empty">该教程没有截图，文字说明已在上方展示。</div>'

      detail.innerHTML =
        '<div class="panel-head">' +
          '<div>' +
            '<h3>' + escapeHtml(guide.title) + '</h3>' +
            '<p>' + escapeHtml(guide.intro || '查看下方说明和步骤截图。') + '</p>' +
          '</div>' +
          '<div class="panel-actions">' +
            '<span class="pill">' + escapeHtml(guide.category) + '</span>' +
            '<span class="pill">' + guide.sections.length + ' 个说明区块</span>' +
            '<span class="pill">' + guide.steps.length + ' 张截图</span>' +
          '</div>' + toc +
        '</div>' +
        '<div class="content">' + sections + steps + '</div>'
      detail.scrollTop = 0
      detail.querySelectorAll('.toc button').forEach((button) => {
        button.addEventListener('click', () => {
          const target = detail.querySelector('#' + CSS.escape(button.dataset.target))
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' })
        })
      })
    }

    function selectFromHash() {
      const hash = decodeURIComponent(window.location.hash.replace(/^#/, ''))
      const target = state.guides.find((guide) => guide.path === hash) || state.guides[0]
      if (target) selectGuide(target.path)
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
    }

    searchInput.addEventListener('input', () => {
      state.query = searchInput.value
      applyFilters()
    })

    expandFirst.addEventListener('click', () => {
      const first = state.filtered[0] || state.guides[0]
      if (first) selectGuide(first.path)
    })
  </script>
</body>
</html>
